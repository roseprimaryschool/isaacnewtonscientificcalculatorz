        let waveTimeout = null;

        function resetPlayer() {
            if (waveTimeout) {
                clearTimeout(waveTimeout);
                waveTimeout = null;
            }
            const startPlatform = platforms[0] || { y: height - 150 };
            player.x = 100;
            player.y = startPlatform.y - player.h - 150;
            player.vx = 0;
            player.vy = 0;
            player.jumps = 0;
            player.facing = 1;
            enemyProjectiles = [];
            player.isAttacking = false;
            player.attackTimer = 0;
            player.isCharging = false;
            player.charge = 0;
            player.isDashing = false;
            player.dashTimer = 0;
            player.chargeSpeed = 1;
            player.damageResist = 1.0;
            health = 100;
            if (healthBar) healthBar.style.width = '100%';
            if (chargeBar) chargeBar.style.width = '0%';
            isTransitioning = false;
            isElevatorRising = false;
            
            if (arenaActive) {
                arenaActive = false;
                platforms = platforms.filter(p => !p.isWall);
                enemies = [];
                // Restore pendingArena based on floor
                const curY = height - 150;
                if (floor === 3) {
                    pendingArena = { triggerX: 2950, startX: 2660, endX: 3900, y: curY, waves: 2 };
                } else if (floor === 5) {
                    pendingArena = { triggerX: 3100, startX: 2760, endX: 4000, y: curY, waves: 2 };
                }
                
                coins_collected = coinsAtArenaStart;
                const coinVal = document.getElementById('coin-val');
                if (coinVal) coinVal.innerText = coins_collected.toString().padStart(4, '0');
            }
        }

        let floorTextTimer = 0;
        let nextFloorNum = 1;

        function advanceFloor() {
            if (isTransitioning) return;
            isTransitioning = true;
            isElevatorRising = true;
            elevatorY = 0;
            nextFloorNum = floor + 1;
            floorTextTimer = 180; // 3 seconds at 60fps
        }

        function showMsg(txt) {
            message.innerText = txt;
            message.classList.add('active');
            setTimeout(() => message.classList.remove('active'), 2500);
        }

        // Controls
        window.addEventListener('keydown', e => {
            initMusic();
            if (isTransitioning) return;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                if (player.grounded) {
                    player.vy = JUMP_FORCE;
                    player.grounded = false;
                    player.jumps = 1;
                } else if (player.jumps < 2) {
                    player.vy = JUMP_FORCE * 0.85;
                    player.jumps = 2;
                    createParticles(player.x + player.w/2, player.y + player.h, varColor('--neon-cyan'), 5);
                }
            }
            if (e.code === 'KeyJ' || e.code === 'KeyK' || e.code === 'KeyF') {
                if (!player.isCharging && !player.isAttacking && !player.isDashing) {
                    player.isCharging = true;
                    player.charge = 0;
                }
            }
            
            // Shop Keys
            if (showShop) {
                if (e.key === '1') buyItem(0);
                if (e.key === '2') buyItem(1);
                if (e.key === '3') buyItem(2);
            }
            keys[e.code] = true;
        });

        function buyItem(idx) {
            const item = shopItems[idx];
            if (selectedShopItem === idx) {
                if (coins_collected >= item.price) {
                    coins_collected -= item.price;
                    item.action();
                    const coinVal = document.getElementById('coin-val');
                    if (coinVal) coinVal.innerText = coins_collected.toString().padStart(4, '0');
                    showMsg("PURCHASED: " + item.name);
                    selectedShopItem = -1;
                } else {
                    showMsg("INSUFFICIENT COINS");
                    selectedShopItem = -1;
                }
            } else {
                selectedShopItem = idx;
                showMsg("CONFIRM PURCHASE: " + item.name);
            }
        }
        window.addEventListener('keyup', e => {
            if (e.code === 'KeyJ' || e.code === 'KeyK' || e.code === 'KeyF') {
                if (player.isCharging) {
                    if (player.weapon === 'bow') {
                        fireBow();
                    } else {
                        if (player.charge >= 60) {
                            startDashAttack();
                        } else {
                            startNormalAttack();
                        }
                    }
                    player.isCharging = false;
                    player.charge = 0;
                    if (chargeBar) chargeBar.style.width = '0%';
                }
            }
            keys[e.code] = false;
        });

        function startNormalAttack() {
            player.isAttacking = true;
            player.attackTimer = 15;
            player.attackType = 'normal';
        }

        function startDashAttack() {
            player.isDashing = true;
            player.dashTimer = 20;
            player.attackType = 'dash';
            player.vx = player.facing * 25;
            player.vy = 0;
            createParticles(player.x, player.y + player.h/2, varColor('--neon-pink'), 10);
        }

        function fireBow() {
            const chargeFactor = player.charge / 100;
            const speed = 12 + chargeFactor * 18;
            const damage = 1 + chargeFactor * 4;
            arrows.push({
                x: player.x + player.w/2,
                y: player.y + player.h/2,
                vx: player.facing * speed,
                vy: -1.5,
                damage: damage
            });
            player.charge = 0;
            if (chargeBar) chargeBar.style.width = '0%';
        }

        function setupMobileBtn(id, key) {
            const btn = document.getElementById(id);
            if (!btn) return;
            btn.addEventListener('touchstart', (e) => { 
                initMusic();
                e.preventDefault(); 
                if (isTransitioning) return;
                
                if (id === 'btn-attack') {
                    if (!player.isCharging && !player.isAttacking && !player.isDashing) {
                        player.isCharging = true;
                        player.charge = 0;
                    }
                    return;
                }

                if (key === 'Space') {
                    if (player.grounded) {
                        player.vy = JUMP_FORCE;
                        player.grounded = false;
                        player.jumps = 1;
                    } else if (player.jumps < 2) {
                        player.vy = JUMP_FORCE * 0.85;
                        player.jumps = 2;
                        createParticles(player.x + player.w/2, player.y + player.h, varColor('--neon-cyan'), 5);
                    }
                }
                keys[key] = true; 
            }, { passive: false });
            btn.addEventListener('touchend', (e) => { 
                e.preventDefault(); 
                if (id === 'btn-attack') {
                    if (player.isCharging) {
                        if (player.weapon === 'bow') {
                            fireBow();
                        } else {
                            if (player.charge >= 60) {
                                startDashAttack();
                            } else {
                                startNormalAttack();
                            }
                        }
                        player.isCharging = false;
                        player.charge = 0;
                        if (chargeBar) chargeBar.style.width = '0%';
                    }
                    return;
                }
                keys[key] = false; 
            }, { passive: false });
        }
        setupMobileBtn('btn-left', 'KeyA');
        setupMobileBtn('btn-right', 'KeyD');
        setupMobileBtn('btn-jump', 'Space');
        setupMobileBtn('btn-attack', 'KeyJ');

        function createParticles(x, y, color, count) {
            for(let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 1.0,
                    color,
                    size: 2 + Math.random() * 3
                });
            }
        }

        function takeDamage(amt, sourceX) {
            if (invincibilityFrames > 0) return;
            
            health -= amt * (player.damageResist || 1.0);
            invincibilityFrames = 60; // 1 second at 60fps
            player.vy = -12;
            player.vx = (player.x < sourceX) ? -15 : 15;
            createParticles(player.x + player.w/2, player.y + player.h/2, varColor('--neon-pink'), 15);
            if (health <= 0) {
                showMsg("SYSTEM FAILURE");
                resetPlayer();
            }
            if (healthBar) healthBar.style.width = Math.max(0, health) + '%';
        }

        function update() {
            if (isTransitioning) {
                player.vx = 0;
                player.vy = 0;
                player.y -= 10;
                elevatorY -= 10;
                floorTextTimer--;
                
                cameraX += (width / 2 - player.x - player.w / 2 - cameraX) * 0.1;
                cameraY += (height / 2 - player.y - player.h / 2 - cameraY) * 0.1;

                if (floorTextTimer <= 0) {
                    isElevatorRising = false;
                    isTransitioning = false;
                    floor++;
                    const sectorVal = document.getElementById('sector-val');
                    if (sectorVal) sectorVal.innerText = floor < 10 ? '0' + floor : floor;
                    generateFloor(floor);
                    resetPlayer();
                }
                return;
            }
            frameCount++;
            if (invincibilityFrames > 0) invincibilityFrames--;

            // Update Music State
            if (musicSystem) {
                let isCombat = false;
                for (let i = 0; i < enemies.length; i++) {
                    const en = enemies[i];
                    const dist = Math.hypot(player.x - en.x, player.y - en.y);
                    if (dist < 800) {
                        isCombat = true;
                        break;
                    }
                }
                musicSystem.setCombatState(isCombat);
            }

            // Combat Logic
            if (player.isCharging) {
                player.charge += (player.chargeSpeed || 1);
                const maxCharge = player.weapon === 'bow' ? 100 : 60;
                if (player.charge > maxCharge) player.charge = maxCharge;
                
                if (chargeBar) chargeBar.style.width = Math.min(100, (player.charge / maxCharge) * 100) + '%';
                if (player.charge === maxCharge) {
                    createParticles(player.x + player.w/2, player.y + player.h/2, '#fff', 2);
                }
            }

            if (player.isAttacking) {
                player.attackTimer--;
                if (player.attackTimer <= 0) player.isAttacking = false;
            }

            if (player.isDashing) {
                player.dashTimer--;
                player.vy = 0;
                player.vx = player.facing * 25;
                createParticles(player.x + player.w/2, player.y + player.h/2, varColor('--neon-cyan'), 2);
                if (player.dashTimer <= 0) {
                    player.isDashing = false;
                    player.vx *= 0.5;
                }
            }

            // Movement
            if (!player.isDashing) {
                if (keys['KeyA'] || keys['ArrowLeft']) {
                    player.vx = -MOVE_SPEED;
                    player.facing = -1;
                }
                else if (keys['KeyD'] || keys['ArrowRight']) {
                    player.vx = MOVE_SPEED;
                    player.facing = 1;
                }
                else player.vx *= 0.8;

                player.vy += GRAVITY;
            }

            // Arena Logic
            if (pendingArena && player.x > pendingArena.triggerX) {
                arenaActive = true;
                // Close walls
                platforms.push({ x: pendingArena.startX, y: pendingArena.y - 800, w: 40, h: 800, isWall: true });
                platforms.push({ x: pendingArena.endX, y: pendingArena.y - 800, w: 40, h: 800, isWall: true });
                
                currentWave = 1;
                spawnWave(currentWave);
                showMsg("ARENA INITIATED");
                pendingArena = null;
            }

            if (arenaActive) {
                if (enemies.length === 0 && !waveTransition) {
                    if (currentWave < totalWaves) {
                        waveTransition = true;
                        currentWave++;
                        waveTimeout = setTimeout(() => spawnWave(currentWave), 1500);
                    } else {
                        arenaActive = false;
                        arenaCleared = true;
                        showMsg("ARENA CLEARED - SHOP OPEN");
                        // Remove walls
                        platforms = platforms.filter(p => !p.isWall);
                        // Add goal platform
                        const arenaX = floor === 3 ? 2700 : 2800;
                        platforms.push({ x: arenaX + 1100, y: height - 150, w: 200, h: 40, type: 'goal' });
                    }
                }
            }
            
            // Shop Interaction
            if (arenaCleared || floor >= 3) {
                if (shopBtn) shopBtn.style.display = 'block';
            } else {
                if (shopBtn) shopBtn.style.display = 'none';
                showShop = false;
            }
            
            player.x += player.vx;
            player.y += player.vy;

            // Update Platforms
            platforms.forEach(p => {
                if (p.type === 'moving') {
                    p.y = p.startY + Math.sin(frameCount * p.speed) * p.range;
                }
            });

            // Update Enemies
            enemies.forEach(en => {
                if (en.type === 'drone') {
                    en.x += en.vx;
                    if (en.x < en.platform.x || en.x + en.w > en.platform.x + en.platform.w) {
                        en.vx *= -1;
                    }
                } else if (en.type === 'runner') {
                    const distToPlayer = Math.abs(player.x - en.x);
                    const sameLevel = Math.abs(player.y - en.y) < 100;

                    if (en.state === 'idle') {
                        en.timer++;
                        if (en.timer > 30) {
                            en.state = 'sprinting';
                            en.timer = 0;
                        }
                    } else if (en.state === 'sprinting') {
                        const dir = player.x < en.x ? -1 : 1;
                        en.facing = dir;
                        en.vx = dir * 5;
                        en.x += en.vx;
                        
                        if (distToPlayer < 200 && sameLevel) {
                            en.state = 'preparing';
                            en.timer = 0;
                            en.vx = 0;
                        }
                    } else if (en.state === 'preparing') {
                        en.timer++;
                        if (en.timer > 35) {
                            en.state = 'dashing';
                            en.timer = 0;
                        }
                    } else if (en.state === 'dashing') {
                        en.vx = en.facing * 15;
                        en.x += en.vx;
                        en.timer++;
                        if (en.timer > 15) {
                            en.state = 'cooldown';
                            en.timer = 0;
                        }
                    } else if (en.state === 'cooldown') {
                        en.vx = 0;
                        en.timer++;
                        if (en.timer > 40) {
                            en.state = 'idle';
                            en.timer = 0;
                        }
                    }
                    
                    // Keep on platform
                    if (en.x < en.platform.x) en.x = en.platform.x;
                    if (en.x + en.w > en.platform.x + en.platform.w) en.x = en.platform.x + en.platform.w - en.w;
                }
            });

            // Update Coins
            for (let i = coins.length - 1; i >= 0; i--) {
                const c = coins[i];
                if (!c) continue;
                c.y += Math.sin(frameCount * 0.1) * 0.5; // Floating animation
                
                const dx = (player.x + player.w/2) - c.x;
                const dy = (player.y + player.h/2) - c.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 50) {
                    coins_collected += 10;
                    if (coinVal) coinVal.innerText = coins_collected.toString().padStart(4, '0');
                    createParticles(c.x, c.y, '#ffd700', 10);
                    coins.splice(i, 1);
                }
            }

            // Update Lasers
            lasers.forEach(l => {
                if (l.syncWithCrusher) {
                    const crusher = crushers.find(c => Math.abs(c.x - (l.x - 32)) < 10);
                    if (crusher) {
                        l.state = crusher.state === 'waiting' ? 'on' : 'off';
                    }
                } else {
                    l.timer++;
                    // 30% ON, 70% OFF duty cycle (easier lasers)
                    const effectiveCycle = l.cycle * 1.5; // Make the cycle longer
                    const onTime = effectiveCycle * 0.3;
                    if (l.timer >= effectiveCycle) {
                        l.timer = 0;
                    }
                    l.state = l.timer < onTime ? 'on' : 'off';
                }
            });

            // Update Crushers
            crushers.forEach(c => {
                if (c.state === 'waiting') {
                    c.timer++;
                    if (c.timer > 15) { c.state = 'dropping'; c.timer = 0; } // Shorter wait
                } else if (c.state === 'dropping') {
                    c.y += 40; // Drop very fast
                    if (c.y >= c.targetY) { c.y = c.targetY; c.state = 'rising'; }
                } else if (c.state === 'rising') {
                    c.y -= 1.0; // Rise slower
                    if (c.y <= c.startY) { c.y = c.startY; c.state = 'waiting'; }
                }
            });

            // Update Saws
            saws.forEach(s => {
                s.angle += s.speed;
                s.x = s.startX + Math.cos(s.angle) * s.range;
            });

            // Collisions
            player.grounded = false;
            platforms.forEach(p => {
                if (p.type === 'fading' && p.opacity < 0.1) return;

                if (player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h > p.y && player.y < p.y + p.h) {
                    
                    if (player.vy > 0 && player.y + player.h - player.vy <= p.y + 15) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.grounded = true;
                        player.jumps = 0;

                        if (p.type === 'fading') p.opacity -= 0.08;
                        if (p.type === 'goal') advanceFloor();
                    } 
                    else if (player.vx > 0 && player.x + player.w - player.vx <= p.x) {
                        player.x = p.x - player.w; player.vx = 0;
                    } else if (player.vx < 0 && player.x - player.vx >= p.x + p.w) {
                        player.x = p.x + p.w; player.vx = 0;
                    }
                    else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 15) {
                        player.y = p.y + p.h; player.vy = 0;
                    }
                } else if (p.type === 'fading' && p.opacity < 1) {
                    p.opacity += 0.004;
                }
            });

            // Hazards
            spikes.forEach(s => {
                if (player.x + player.w > s.x && player.x < s.x + s.w &&
                    player.y + player.h > s.y && player.y < s.y + s.h) {
                    takeDamage(15, s.x);
                }
            });

            lasers.forEach(l => {
                if (l.state === 'on' && 
                    player.x + player.w > l.x && player.x < l.x + l.w &&
                    player.y + player.h > l.y && player.y < l.y + l.h) {
                    takeDamage(25, l.x);
                }
            });

            crushers.forEach(c => {
                if (player.x + player.w > c.x && player.x < c.x + c.w &&
                    player.y + player.h > c.y && player.y < c.y + c.h) {
                    takeDamage(40, c.x);
                }
            });

            saws.forEach(s => {
                const dx = (player.x + player.w/2) - s.x;
                const dy = (player.y + player.h/2) - s.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < s.r + 10) {
                    takeDamage(30, s.x);
                }
            });

            // Enemy Collision & Combat
            for (let i = enemies.length - 1; i >= 0; i--) {
                const en = enemies[i];
                if (!en) continue;
                
                // AI Logic
                if (en.type === 'drone' || en.type === 'shield') {
                    // Simplified Drone AI: Simple patrol on platform
                    en.x += en.vx;
                    if (en.x < en.platform.x || en.x + en.w > en.platform.x + en.platform.w) {
                        en.vx *= -1;
                        en.x = Math.max(en.platform.x, Math.min(en.x, en.platform.x + en.platform.w - en.w));
                    }
                } else if (en.type === 'knight') {
                    // Neo Knight AI
                    if (en.hasSword === undefined) en.hasSword = true;
                    
                    const distToPlayerX = player.x - en.x;
                    const absDistX = Math.abs(distToPlayerX);
                    
                    // Desired distance: 400 pixels
                    const desiredDist = 400;
                    
                    let dir = 0;
                    if (absDistX < desiredDist - 20) {
                        // Too close, run away
                        dir = distToPlayerX > 0 ? -1 : 1;
                    } else if (absDistX > desiredDist + 20) {
                        // Too far, move closer
                        dir = distToPlayerX > 0 ? 1 : -1;
                    }
                    
                    // Always face the player
                    en.facing = distToPlayerX > 0 ? 1 : -1;
                    
                    // Movement: 75% of player speed
                    en.vx = dir * KNIGHT_SPEED;
                    en.x += en.vx;
                    
                    // Stay on platform
                    if (en.x < en.platform.x) { en.x = en.platform.x; en.vx = 0; }
                    if (en.x + en.w > en.platform.x + en.platform.w) { en.x = en.platform.x + en.platform.w - en.w; en.vx = 0; }
                    
                    // Attack: Throw laser sword if they have it
                    if (en.hasSword) {
                        en.attackTimer = (en.attackTimer || 0) + 1;
                        if (en.attackTimer >= 100) { // Nerfed: Increased from 60 to 100 (1.66s)
                            en.hasSword = false;
                            en.attackTimer = 0;
                            enemyProjectiles.push({
                                x: en.x + en.w/2,
                                y: en.y + en.h/2,
                                vx: en.facing * 12,
                                vy: 0,
                                w: 60,
                                h: 15,
                                type: 'sword',
                                owner: en,
                                timer: 0
                            });
                        }
                    }
                } else if (en.type === 'runner') {
                    const distToPlayer = Math.abs(player.x - en.x);
                    const sameLevel = Math.abs(player.y - en.y) < 100;

                    if (en.state === 'idle') {
                        en.timer++;
                        if (en.timer > 30) {
                            en.state = 'sprinting';
                            en.timer = 0;
                        }
                    } else if (en.state === 'sprinting') {
                        const dir = player.x < en.x ? -1 : 1;
                        en.facing = dir;
                        en.vx = dir * 5;
                        en.x += en.vx;
                        
                        if (distToPlayer < 200 && sameLevel) {
                            en.state = 'preparing';
                            en.timer = 0;
                            en.vx = 0;
                        }
                    } else if (en.state === 'preparing') {
                        en.timer++;
                        if (en.timer > 35) {
                            en.state = 'dashing';
                            en.timer = 0;
                        }
                    } else if (en.state === 'dashing') {
                        en.vx = en.facing * 15;
                        en.x += en.vx;
                        en.timer++;
                        if (en.timer > 15) {
                            en.state = 'cooldown';
                            en.timer = 0;
                        }
                    } else if (en.state === 'cooldown') {
                        en.vx = 0;
                        en.timer++;
                        if (en.timer > 40) {
                            en.state = 'idle';
                            en.timer = 0;
                        }
                    }
                    
                    // Keep on platform
                    if (en.x < en.platform.x) en.x = en.platform.x;
                    if (en.x + en.w > en.platform.x + en.platform.w) en.x = en.platform.x + en.platform.w - en.w;
                }

                // Player hits enemy
                if (player.isAttacking || player.isDashing) {
                    const attackRange = player.isDashing ? 80 : 70;
                    const dx = (player.x + player.w/2) - (en.x + en.w/2);
                    const dy = (player.y + player.h/2) - (en.y + en.h/2);
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    // More forgiving hitbox for drones
                    const hitRange = (en.type === 'drone' || en.type === 'shield') ? attackRange + 20 : attackRange;
                    
                    if (dist < hitRange) {
                        // Shield check
                        if (en.type === 'shield') {
                            const playerBehind = (en.vx > 0 && player.x > en.x) || (en.vx < 0 && player.x < en.x);
                            if (!playerBehind) {
                                createParticles(en.x + en.w/2, en.y + en.h/2, '#555', 5);
                                player.vx = -player.facing * 10; // Strong recoil
                                continue;
                            }
                        }

                        const isDashHit = player.isDashing;
                        // Neo Knights take 2 hits or 1 dash
                        const damage = (en.type === 'knight' && isDashHit) ? 2 : (isDashHit ? 2 : 1);
                        
                        en.health -= damage;
                        if (en.health <= 0) {
                            createParticles(en.x + en.w/2, en.y + en.h/2, en.type === 'knight' ? '#ff0000' : varColor('--neon-cyan'), 15);
                            coins.push({ x: en.x + en.w/2, y: en.y + en.h/2 });
                            enemies.splice(i, 1);
                        } else {
                            createParticles(en.x + en.w/2, en.y + en.h/2, '#fff', 5);
                            en.vx = player.facing * 10; // Knockback
                        }
                        
                        if (!player.isDashing) {
                            player.vx = -player.facing * 5; // Slight recoil
                        }
                        continue;
                    }
                }

                // Enemy hits player
                if (player.x + player.w > en.x && player.x < en.x + en.w &&
                    player.y + player.h > en.y && player.y < en.y + en.h) {
                    if (!player.isDashing) {
                        if (en.type === 'drone' || en.type === 'shield') {
                            takeDamage(10, en.x);
                        } else if (en.type === 'knight') {
                            takeDamage(25, en.x);
                        } else if (en.type === 'runner' && en.state === 'dashing') {
                            takeDamage(10, en.x);
                        }
                    }
                }
            }

            // Update Enemy Projectiles
            for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
                const p = enemyProjectiles[i];
                if (!p) continue;
                p.x += p.vx;
                p.y += p.vy;
                
                if (p.type === 'sword') {
                    p.timer++;
                    if (p.timer > 90) { // 1.5 seconds out
                        // Return to owner
                        if (p.owner && p.owner.health > 0) {
                            const dx = (p.owner.x + p.owner.w/2) - p.x;
                            const dy = (p.owner.y + p.owner.h/2) - p.y;
                            const dist = Math.hypot(dx, dy);
                            if (dist < 30) {
                                p.owner.hasSword = true;
                                p.owner.attackTimer = 0;
                                enemyProjectiles.splice(i, 1);
                                continue;
                            } else {
                                p.vx = (dx / dist) * 15;
                                p.vy = (dy / dist) * 15;
                            }
                        } else {
                            // Owner is dead, just disappear
                            enemyProjectiles.splice(i, 1);
                            continue;
                        }
                    }
                }
                
                // Collision with player
                if (player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h > p.y && player.y < p.y + p.h) {
                    if (!player.isDashing) {
                        takeDamage(15, p.x); // Nerfed: Reduced from 25 to 15
                        if (p.type === 'sword' && p.timer <= 90) {
                            p.timer = 91; // Force return
                        } else if (p.type !== 'sword') {
                            enemyProjectiles.splice(i, 1);
                            continue;
                        }
                    }
                }
                
                // Collision with platforms
                let hitPlatform = false;
                if (p.type !== 'sword') { // Swords pass through platforms
                    platforms.forEach(plat => {
                        if (p.x > plat.x && p.x < plat.x + plat.w && p.y > plat.y && p.y < plat.y + plat.h) {
                            hitPlatform = true;
                        }
                    });
                }
                
                if (hitPlatform || Math.abs(p.x - player.x) > 2000) {
                    if (p.type === 'sword') {
                        if (Math.abs(p.x - player.x) > 2000) {
                            if (p.owner) p.owner.hasSword = true;
                            enemyProjectiles.splice(i, 1);
                            continue;
                        }
                        if (p.timer <= 90) p.timer = 91; // Force return on platform hit
                    } else {
                        enemyProjectiles.splice(i, 1);
                    }
                }
            }

            // Particles
            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                if (!p) continue;
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Update Arrows
            for (let i = arrows.length - 1; i >= 0; i--) {
                const a = arrows[i];
                if (!a) continue;
                a.x += a.vx;
                a.y += a.vy;
                a.vy += 0.15; // Gravity for arrows
                
                // Collision with enemies
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const en = enemies[j];
                    if (a.x > en.x && a.x < en.x + en.w && a.y > en.y && a.y < en.y + en.h) {
                        // Shield check
                        if (en.type === 'shield') {
                            const arrowFromFront = (a.vx > 0 && a.x < en.x + en.w/2) || (a.vx < 0 && a.x > en.x + en.w/2);
                            if (arrowFromFront) {
                                createParticles(a.x, a.y, '#555', 5);
                                arrows.splice(i, 1);
                                break;
                            }
                        }

                        en.health -= a.damage;
                        createParticles(a.x, a.y, varColor('--neon-cyan'), 10);
                        if (en.health <= 0) {
                            createParticles(en.x + en.w/2, en.y + en.h/2, varColor('--neon-cyan'), 15);
                            coins_collected += en.isElite ? 50 : 10;
                            const coinVal = document.getElementById('coin-val');
                            if (coinVal) coinVal.innerText = coins_collected.toString().padStart(4, '0');
                            enemies.splice(j, 1);
                        }
                        arrows.splice(i, 1);
                        break;
                    }
                }
                
                // Collision with platforms
                platforms.forEach(p => {
                    if (a.x > p.x && a.x < p.x + p.w && a.y > p.y && a.y < p.y + p.h) {
                        arrows.splice(i, 1);
                    }
                });
                
                // Remove out of bounds
                if (a.x < player.x - width || a.x > player.x + width || a.y > height + 500) {
                    if (arrows[i]) arrows.splice(i, 1);
                }
            }

            // Fall off
            if (player.y > height + 500) {
                showMsg("REBOOTING...");
                resetPlayer();
            }

            // Camera
            cameraX += (width/3 - player.x - cameraX) * 0.1;
            cameraY += (height/2 - player.y - cameraY) * 0.1;
        }

        function drawBackground() {
            // Background Gradient: Dark Blue to Purple
            const bgGrad = ctx.createLinearGradient(0, 0, 0, height);
            bgGrad.addColorStop(0, '#050510');
            bgGrad.addColorStop(0.5, '#0a0520');
            bgGrad.addColorStop(1, '#150030');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, width, height);

            // Neon Bricks Pattern
            ctx.save();
            const pX = cameraX * 0.2;
            const pY = cameraY * 0.2;
            
            const brickW = 80;
            const brickH = 35;
            const gap = 5;
            const totalW = brickW + gap;
            const totalH = brickH + gap;
            
            const startCol = Math.floor(-pX / totalW) - 1;
            const endCol = startCol + Math.ceil(width / totalW) + 2;
            const startRow = Math.floor(-pY / totalH) - 1;
            const endRow = startRow + Math.ceil(height / totalH) + 2;

            const colors = [
                { stroke: 'rgba(0, 255, 255, 0.4)', fill: 'rgba(0, 255, 255, 0.05)', shadow: '#00ffff' }, // Cyan
                { stroke: 'rgba(0, 85, 255, 0.4)', fill: 'rgba(0, 85, 255, 0.05)', shadow: '#0055ff' },  // Dark Blue
                { stroke: 'rgba(176, 38, 255, 0.4)', fill: 'rgba(176, 38, 255, 0.05)', shadow: '#b026ff' },// Purple
                { stroke: 'rgba(20, 20, 20, 0.6)', fill: 'rgba(5, 5, 5, 0.8)', shadow: 'transparent' }   // Black
            ];

            ctx.lineWidth = 2;

            for (let i = 0; i < colors.length; i++) {
                ctx.beginPath();
                ctx.strokeStyle = colors[i].stroke;
                ctx.fillStyle = colors[i].fill;
                ctx.shadowColor = colors[i].shadow;
                ctx.shadowBlur = (i === 3) ? 0 : 8;
                
                for (let row = startRow; row <= endRow; row++) {
                    const y = row * totalH + pY;
                    const xOffset = (Math.abs(row) % 2 === 1) ? totalW / 2 : 0;
                    for (let col = startCol; col <= endCol; col++) {
                        const rand = Math.abs(Math.sin(row * 12.9898 + col * 78.233)) * 43758.5453;
                        const colorIndex = Math.floor(rand) % colors.length;
                        
                        if (colorIndex === i) {
                            const x = col * totalW + xOffset + pX;
                            ctx.rect(x, y, brickW, brickH);
                        }
                    }
                }
                ctx.fill();
                ctx.stroke();
            }
            
            ctx.restore();
        }

        function draw() {
            drawBackground();

            ctx.save();
            ctx.translate(cameraX, cameraY);

            // Platforms
            platforms.forEach(p => {
                if (p.type === 'goal') {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 3;
                    
                    const elevX = p.x;
                    const elevY = p.y + (isElevatorRising ? elevatorY : 0);
                    
                    ctx.fillRect(elevX, elevY, p.w, p.h);
                    ctx.strokeRect(elevX, elevY, p.w, p.h);
                    
                    // Shaft visual
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.moveTo(elevX, elevY); ctx.lineTo(elevX, elevY - 1000);
                    ctx.moveTo(elevX + p.w, elevY); ctx.lineTo(elevX + p.w, elevY - 1000);
                    ctx.stroke();

                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 16px Orbitron';
                    ctx.textAlign = 'center';
                    ctx.fillText('ASCEND', elevX + p.w/2, elevY + 25);
                } else if (p.type === 'block') {
                    ctx.fillStyle = '#111';
                    ctx.strokeStyle = varColor('--neon-cyan');
                    ctx.lineWidth = 2;
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.strokeRect(p.x, p.y, p.w, p.h);
                } else if (p.type === 'moving') {
                    ctx.fillStyle = '#000';
                    ctx.strokeStyle = varColor('--neon-cyan');
                    ctx.lineWidth = 3;
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.strokeRect(p.x, p.y, p.w, p.h);
                } else if (p.type === 'fading') {
                    ctx.globalAlpha = p.opacity;
                    ctx.fillStyle = '#000';
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.strokeRect(p.x, p.y, p.w, p.h);
                    ctx.globalAlpha = 1.0;
                } else if (p.type === 'shop') {
                    ctx.fillStyle = '#000';
                    ctx.strokeStyle = varColor('--neon-pink');
                    ctx.lineWidth = 3;
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.strokeRect(p.x, p.y, p.w, p.h);
                    
                    ctx.fillStyle = varColor('--neon-pink');
                    ctx.font = 'bold 20px Orbitron';
                    ctx.textAlign = 'center';
                    ctx.fillText('NEON SHOP', p.x + p.w/2, p.y - 40);
                    ctx.font = '12px Orbitron';
                    ctx.fillText('STAND HERE TO BROWSE', p.x + p.w/2, p.y - 20);
                } else if (p.isWall) {
                    ctx.fillStyle = 'rgba(255, 0, 85, 0.2)';
                    ctx.strokeStyle = varColor('--neon-pink');
                    ctx.lineWidth = 4;
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.strokeRect(p.x, p.y, p.w, p.h);
                    
                    // Warning stripes
                    ctx.strokeStyle = 'rgba(255, 0, 85, 0.5)';
                    ctx.lineWidth = 2;
                    for (let sy = p.y; sy < p.y + p.h; sy += 20) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, sy);
                        ctx.lineTo(p.x + p.w, sy + 10);
                        ctx.stroke();
                    }
                } else {
                    ctx.fillStyle = '#000';
                    ctx.strokeStyle = varColor('--neon-cyan');
                    ctx.lineWidth = 2;
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.strokeRect(p.x, p.y, p.w, p.h);
                }
            });

            // Spikes
            spikes.forEach(s => {
                ctx.fillStyle = varColor('--neon-pink');
                ctx.beginPath();
                const step = 15;
                for(let x = s.x; x < s.x + s.w; x += step) {
                    ctx.moveTo(x, s.y + s.h);
                    ctx.lineTo(x + step/2, s.y);
                    ctx.lineTo(x + step, s.y + s.h);
                }
                ctx.fill();
            });

            // Lasers
            lasers.forEach(l => {
                if (l.state === 'on') {
                    ctx.fillStyle = varColor('--neon-pink');
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = varColor('--neon-pink');
                    ctx.fillRect(l.x, l.y, l.w, l.h);
                    ctx.shadowBlur = 0;
                } else {
                    ctx.strokeStyle = 'rgba(255, 0, 85, 0.6)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.strokeRect(l.x, l.y, l.w, l.h);
                    ctx.setLineDash([]);
                    ctx.lineWidth = 1;
                }
            });

            // Crushers
            crushers.forEach(c => {
                ctx.fillStyle = '#111';
                ctx.strokeStyle = varColor('--neon-pink');
                ctx.lineWidth = 3;
                ctx.fillRect(c.x, c.y, c.w, c.h);
                ctx.strokeRect(c.x, c.y, c.w, c.h);
                
                ctx.fillStyle = varColor('--neon-pink');
                for(let tx = c.x; tx < c.x + c.w; tx += 20) {
                    ctx.beginPath();
                    ctx.moveTo(tx, c.y + c.h);
                    ctx.lineTo(tx + 10, c.y + c.h + 15);
                    ctx.lineTo(tx + 20, c.y + c.h);
                    ctx.fill();
                }
            });

            // Saws
            saws.forEach(s => {
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(frameCount * 0.2);
                ctx.fillStyle = '#222';
                ctx.strokeStyle = varColor('--neon-pink');
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, s.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                
                // Teeth
                ctx.fillStyle = varColor('--neon-pink');
                for(let i = 0; i < 8; i++) {
                    ctx.rotate(Math.PI / 4);
                    ctx.beginPath();
                    ctx.moveTo(s.r - 5, -5);
                    ctx.lineTo(s.r + 15, 0);
                    ctx.lineTo(s.r - 5, 5);
                    ctx.fill();
                }
                ctx.restore();
            });

            // Coins
            coins.forEach(c => {
                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.rotate(frameCount * 0.1);
                ctx.fillStyle = '#ffd700';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.rect(-8, -8, 16, 16);
                ctx.fill();
                ctx.stroke();
                
                // Coin Glow
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffd700';
                ctx.stroke();
                ctx.restore();
            });

            // Enemies
            enemies.forEach(en => {
                if (en.type === 'drone' || en.type === 'shield') {
                    ctx.fillStyle = '#000';
                    ctx.strokeStyle = en.isElite ? varColor('--neon-cyan') : varColor('--neon-pink');
                    ctx.lineWidth = en.isElite ? 4 : 2;
                    ctx.strokeRect(en.x, en.y, en.w, en.h);
                    
                    if (en.type === 'shield') {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                        if (en.vx > 0) ctx.fillRect(en.x, en.y, 5, en.h);
                        else ctx.fillRect(en.x + en.w - 5, en.y, 5, en.h);
                    }

                    // Eye
                    ctx.fillStyle = en.isElite ? varColor('--neon-cyan') : varColor('--neon-pink');
                    ctx.fillRect(en.x + (en.vx > 0 ? en.w - 10 : 5), en.y + 10, 5, 5);
                    
                    // Glow
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = en.isElite ? varColor('--neon-cyan') : varColor('--neon-pink');
                    ctx.strokeRect(en.x, en.y, en.w, en.h);
                    ctx.shadowBlur = 0;
                } else if (en.type === 'knight') {
                    // Neo Knight: Red Hexagon
                    ctx.save();
                    ctx.translate(en.x + en.w/2, en.y + en.h/2);
                    
                    ctx.fillStyle = '#111';
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#ff0000';
                    
                    ctx.beginPath();
                    for(let i = 0; i < 6; i++) {
                        const angle = (i * Math.PI) / 3;
                        const x = (en.w/2) * Math.cos(angle);
                        const y = (en.h/2) * Math.sin(angle);
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                    
                    // Sword
                    ctx.save();
                    ctx.translate(en.facing * 15, 0);
                    ctx.rotate(en.facing === 1 ? Math.PI/4 : -Math.PI/4 + Math.PI);
                    
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(-10, 0); ctx.stroke();
                    
                    ctx.strokeStyle = '#ff0000';
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 15;
                    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(25, 0); ctx.stroke();
                    ctx.restore();
                    
                    ctx.restore();
                } else if (en.type === 'runner') {
                    ctx.fillStyle = '#000';
                    ctx.strokeStyle = varColor('--neon-pink');
                    ctx.lineWidth = 2;
                    ctx.fillRect(en.x, en.y, en.w, en.h);
                    ctx.strokeRect(en.x, en.y, en.w, en.h);
                    
                    // Eyes/Glow
                    ctx.fillStyle = varColor('--neon-pink');
                    if (en.state === 'preparing') {
                        ctx.globalAlpha = Math.sin(frameCount * 0.5) * 0.5 + 0.5;
                        ctx.fillRect(en.x, en.y, en.w, en.h);
                        ctx.globalAlpha = 1.0;
                    }
                    
                    const eyeX = en.facing === 1 ? en.x + en.w - 10 : en.x + 2;
                    ctx.fillRect(eyeX, en.y + 5, 8, 4);
                    
                    // Dash trail if dashing
                    if (en.state === 'dashing') {
                        ctx.globalAlpha = 0.3;
                        ctx.fillRect(en.x - en.vx * 2, en.y, en.w, en.h);
                        ctx.globalAlpha = 1.0;
                    }
                }
            });

            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1.0;

            // Arrows
            arrows.forEach(a => {
                ctx.strokeStyle = varColor('--neon-pink');
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(a.x, a.y);
                ctx.lineTo(a.x - a.vx * 1.5, a.y - a.vy * 1.5);
                ctx.stroke();
            });

            // Enemy Projectiles (Laser Swords)
            enemyProjectiles.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(frameCount * 0.5); // Spin the sword
                
                // Outer Glow
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 6;
                ctx.shadowBlur = 25;
                ctx.shadowColor = '#ff0000';
                ctx.beginPath();
                ctx.moveTo(-p.w/2, 0);
                ctx.lineTo(p.w/2, 0);
                ctx.stroke();

                // Inner Core
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.moveTo(-p.w/2 + 5, 0);
                ctx.lineTo(p.w/2 - 5, 0);
                ctx.stroke();
                
                // Hilt
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 5;
                ctx.beginPath();
                ctx.moveTo(-p.w/2, 0);
                ctx.lineTo(-p.w/2 + 12, 0);
                ctx.stroke();
                
                ctx.restore();
            });

            // Player (Cube)
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Dash trail
            if (player.isDashing) {
                ctx.globalAlpha = 0.5;
                ctx.fillStyle = '#00f2ff';
                ctx.fillRect(-player.vx * 2, -player.vy * 2, player.w, player.h);
                ctx.globalAlpha = 1.0;
            }

            const cubeColor = '#00f2ff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = cubeColor;
            ctx.strokeStyle = cubeColor;
            ctx.lineWidth = 3;
            
            // Draw the cube
            ctx.strokeRect(0, 0, player.w, player.h);
            ctx.fillStyle = 'rgba(0, 242, 255, 0.2)';
            ctx.fillRect(0, 0, player.w, player.h);
            
            ctx.shadowBlur = 0;

            // Sword / Bow (Attached to Cube)
            if (player.weapon === 'sword') {
                if (player.isAttacking || player.isDashing || player.isCharging) {
                    ctx.save();
                    // Attach to the side of the cube
                    ctx.translate(player.facing === 1 ? player.w : 0, player.h / 2);
                    
                    let angle = 0;
                    if (player.isCharging) {
                        angle = -Math.PI / 4;
                    } else if (player.isAttacking) {
                        angle = (1 - player.attackTimer / 15) * Math.PI - Math.PI/2;
                    } else if (player.isDashing) {
                        angle = Math.PI / 2;
                    }
                    
                    ctx.rotate(player.facing === 1 ? angle : -angle + Math.PI);
                    
                    const swordColor = player.charge >= 60 ? '#fff' : '#00f2ff';
                    const swordLen = 70;
                    
                    // Handle (Tsuka)
                    ctx.strokeStyle = '#111';
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(-15, 0);
                    ctx.stroke();

                    // Guard (Tsuba)
                    ctx.fillStyle = '#333';
                    ctx.fillRect(-5, -10, 6, 20);
                    
                    // Blade
                    const bladeGrad = ctx.createLinearGradient(0, -4, 0, 4);
                    bladeGrad.addColorStop(0, swordColor);
                    bladeGrad.addColorStop(0.5, '#fff');
                    bladeGrad.addColorStop(1, swordColor);
                    
                    ctx.fillStyle = bladeGrad;
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = swordColor;
                    
                    ctx.beginPath();
                    ctx.moveTo(0, -4);
                    ctx.lineTo(swordLen - 12, -4);
                    ctx.lineTo(swordLen, 0);
                    ctx.lineTo(swordLen - 12, 4);
                    ctx.lineTo(0, 4);
                    ctx.closePath();
                    ctx.fill();
                    
                    ctx.restore();
                }
            } else if (player.weapon === 'bow') {
                ctx.save();
                ctx.translate(player.facing === 1 ? player.w : 0, player.h / 2);
                ctx.rotate(player.facing === 1 ? 0 : Math.PI);
                
                // Draw Bow
                ctx.strokeStyle = varColor('--neon-pink');
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, 25, -Math.PI/2, Math.PI/2);
                ctx.stroke();
                
                // Draw String
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, -25);
                const pull = player.isCharging ? (player.charge / 100) * 20 : 0;
                ctx.lineTo(-pull, 0);
                ctx.lineTo(0, 25);
                ctx.stroke();
                
                // Draw Arrow if charging
                if (player.isCharging) {
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(-pull, -2, 30, 4);
                }
                
                ctx.restore();
            }
            ctx.restore();

            ctx.restore();

            // Floor Transition Text
            if (isElevatorRising) {
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                
                // Darken background slightly
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.fillRect(0, 0, width, height);

                const text = "FLOOR " + nextFloorNum;
                ctx.font = 'bold 80px Orbitron';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Draw cool text with colors dark blue, purple, cyan, and black
                ctx.lineWidth = 12;
                ctx.strokeStyle = '#050515'; // black
                ctx.strokeText(text, width/2, height/4);
                
                ctx.lineWidth = 8;
                ctx.strokeStyle = '#b026ff'; // purple
                ctx.strokeText(text, width/2, height/4);
                
                ctx.lineWidth = 4;
                ctx.strokeStyle = '#0055ff'; // dark blue
                ctx.strokeText(text, width/2, height/4);
                
                ctx.fillStyle = '#0ff'; // cyan
                ctx.fillText(text, width/2, height/4);
                
                ctx.restore();
            }

            // Scanlines
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            for(let i = 0; i < height; i += 4) {
                ctx.fillRect(0, i, width, 2);
            }

            // Shop UI
            if (showShop) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(width/2 - 200, height/2 - 150, 400, 300);
                ctx.strokeStyle = varColor('--neon-pink');
                ctx.lineWidth = 2;
                ctx.strokeRect(width/2 - 200, height/2 - 150, 400, 300);
                
                ctx.fillStyle = '#fff';
                ctx.font = '20px Orbitron';
                ctx.textAlign = 'center';
                ctx.fillText('NEON SHOP', width/2, height/2 - 110);
                ctx.font = '14px Orbitron';
                ctx.fillText(`COINS: ${coins_collected}`, width/2, height/2 - 85);
                
                shopItems.forEach((item, idx) => {
                    const y = height/2 - 40 + idx * 60;
                    const isSelected = selectedShopItem === idx;
                    
                    ctx.fillStyle = isSelected ? 'rgba(0, 242, 255, 0.2)' : (coins_collected >= item.price ? 'rgba(255, 255, 255, 0.1)' : 'rgba(255, 0, 0, 0.1)');
                    ctx.fillRect(width/2 - 180, y - 20, 360, 50);
                    ctx.strokeStyle = isSelected ? '#fff' : (coins_collected >= item.price ? varColor('--neon-cyan') : '#555');
                    ctx.strokeRect(width/2 - 180, y - 20, 360, 50);
                    
                    ctx.fillStyle = '#fff';
                    ctx.textAlign = 'left';
                    ctx.font = 'bold 14px Orbitron';
                    ctx.fillText(item.name, width/2 - 170, y + 5);
                    ctx.font = '10px Orbitron';
                    ctx.fillText(item.desc, width/2 - 170, y + 20);
                    
                    ctx.textAlign = 'right';
                    ctx.fillStyle = isSelected ? '#fff' : varColor('--neon-cyan');
                    ctx.fillText(isSelected ? 'CONFIRM?' : `${item.price}C`, width/2 + 170, y + 10);
                    
                    ctx.font = '8px Orbitron';
                    ctx.fillStyle = '#888';
                    ctx.textAlign = 'center';
                    ctx.fillText('CLICK ITEMS OR PRESS 1-3 TO BUY', width/2, height/2 + 135);
                });
            }
        }

        function varColor(name, fallback = '#fff') {
            const style = getComputedStyle(document.documentElement);
            if (!style) return fallback;
            const val = style.getPropertyValue(name).trim();
            return val || fallback;
        }

        function loop() {
            if (gameState === 'playing') {
                update();
                draw();
            } else {
                // Background draw for menu
                drawBackground();
                
                // Static character or some menu visuals could go here
                ctx.save();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
                // Scanlines
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                for(let i = 0; i < height; i += 4) {
                    ctx.fillRect(0, i, width, 2);
                }
                ctx.restore();
            }
            requestAnimationFrame(loop);
        }

        generateFloor(1);
        resetPlayer();
        loop();
    </script>
</body>
</html>

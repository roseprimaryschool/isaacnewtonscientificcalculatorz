<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Runner - Sector Ascent</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --neon-cyan: #00f2ff;
            --neon-pink: #ff0055;
            --bg-dark: #050508;
            --grid-line: rgba(0, 242, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', monospace;
            touch-action: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--neon-cyan);
            padding: 12px 20px;
            box-shadow: 4px 4px 0px var(--neon-cyan);
            min-width: 120px;
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
        }

        #message {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 40px;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            color: #fff;
            background: var(--neon-pink);
            padding: 10px 30px;
            box-shadow: 8px 8px 0px #000;
            z-index: 20;
        }

        #message.active { opacity: 1; }

        .health-bar-container {
            width: 150px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 8px;
            border: 1px solid var(--neon-cyan);
            position: relative;
        }

        #health-bar {
            width: 100%;
            height: 100%;
            background: var(--neon-cyan);
            transition: width 0.2s;
        }

        #charge-bar {
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 0%;
            height: 4px;
            background: var(--neon-pink);
            transition: width 0.1s;
        }

        #hotbar {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
            pointer-events: auto;
        }
        .slot {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            color: var(--neon-cyan);
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--neon-cyan);
            transition: all 0.1s;
        }
        .slot.active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 4px 4px 0px #fff;
            transform: translateY(-5px);
        }

        #shop-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--neon-pink);
            color: #fff;
            border: 2px solid #000;
            padding: 10px 20px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            display: none;
            z-index: 100;
            box-shadow: 4px 4px 0px #000;
            text-transform: uppercase;
        }
        #shop-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000;
        }
        #shop-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        /* Mobile Controls - Sharp Brutalist Style */
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 100;
            pointer-events: none;
        }

        .control-group {
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }

        .btn {
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neon-cyan);
            font-size: 28px;
            font-weight: bold;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 4px 4px 0px var(--neon-cyan);
            pointer-events: auto;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--neon-cyan);
            background: var(--neon-cyan);
            color: #000;
        }

        @media (max-width: 1366px), (pointer: coarse) {
            #mobile-controls { display: flex; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat-box" id="sector-box">
            <div class="label">FLOOR</div>
            <div class="value"><span id="sector-val">01</span></div>
            <div class="health-bar-container">
                <div id="health-bar"></div>
                <div id="charge-bar"></div>
            </div>
        </div>
        <div class="stat-box" style="border-color: #ffd700; box-shadow: 4px 4px 0px #ffd700;">
            <div class="label" style="color: #ffd700; opacity: 1;">PIXEL COINS</div>
            <div class="value" id="coin-val" style="color: #ffd700;">0</div>
        </div>
    </div>
    
    <div id="message">FLOOR CLEAR</div>
    <button id="shop-btn">NEON SHOP</button>

    <div id="hotbar" style="display: none;">
        <div class="slot active" id="slot-sword">SWORD</div>
        <div class="slot" id="slot-bow">BOW</div>
    </div>

    <div id="mobile-controls">
        <div class="control-group">
            <div class="btn" id="btn-left">←</div>
            <div class="btn" id="btn-right">→</div>
        </div>
        <div class="control-group" style="gap: 15px;">
            <div class="btn" id="btn-switch" style="border-color: #ffd700; color: #ffd700; box-shadow: 4px 4px 0px #ffd700; font-size: 12px; display: none;">SWAP</div>
            <div class="btn" id="btn-attack" style="border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 4px 4px 0px var(--neon-pink);">ATK</div>
            <div class="btn" id="btn-jump">UP</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const sectorVal = document.getElementById('sector-val');
        const healthBar = document.getElementById('health-bar');
        const chargeBar = document.getElementById('charge-bar');
        const coinVal = document.getElementById('coin-val');
        const message = document.getElementById('message');
        const shopBtn = document.getElementById('shop-btn');
        const sectorBox = document.getElementById('sector-box');
        const mobileControls = document.getElementById('mobile-controls');
        const hotbar = document.getElementById('hotbar');
        const slotSword = document.getElementById('slot-sword');
        const slotBow = document.getElementById('slot-bow');
        const btnSwitch = document.getElementById('btn-switch');

        function toggleShop() {
            showShop = !showShop;
            selectedShopItem = -1; // Reset selection
            if (showShop) {
                if (sectorBox) sectorBox.style.display = 'none';
                if (mobileControls) mobileControls.style.display = 'none';
                if (hotbar) hotbar.style.display = 'none';
                if (shopBtn) shopBtn.innerText = 'CLOSE SHOP';
            } else {
                if (sectorBox) sectorBox.style.display = 'block';
                if (shopBtn) shopBtn.innerText = 'NEON SHOP';
                if (player.hasBow && hotbar) hotbar.style.display = 'flex';
                if (mobileControls && ('ontouchstart' in window || navigator.maxTouchPoints > 0)) {
                    mobileControls.style.display = 'flex';
                }
            }
        }

        canvas.addEventListener('click', (e) => {
            if (!showShop) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            shopItems.forEach((item, idx) => {
                const y = height/2 - 40 + idx * 60;
                if (mouseX > width/2 - 180 && mouseX < width/2 + 180 &&
                    mouseY > y - 20 && mouseY < y + 30) {
                    buyItem(idx);
                }
            });
        });

        function switchWeapon() {
            if (!player.hasBow) return;
            player.weapon = player.weapon === 'sword' ? 'bow' : 'sword';
            updateHotbar();
        }

        function updateHotbar() {
            if (!player.hasBow) {
                if (hotbar) hotbar.style.display = 'none';
                if (btnSwitch) btnSwitch.style.display = 'none';
                return;
            }
            if (hotbar) hotbar.style.display = 'flex';
            if (btnSwitch) btnSwitch.style.display = 'flex';
            
            if (player.weapon === 'sword') {
                slotSword.classList.add('active');
                slotBow.classList.remove('active');
            } else {
                slotSword.classList.remove('active');
                slotBow.classList.add('active');
            }
        }

        if (slotSword) slotSword.addEventListener('click', () => { player.weapon = 'sword'; updateHotbar(); });
        if (slotBow) slotBow.addEventListener('click', () => { if(player.hasBow) { player.weapon = 'bow'; updateHotbar(); } });
        if (btnSwitch) btnSwitch.addEventListener('touchstart', (e) => { e.preventDefault(); switchWeapon(); });

        if (shopBtn) {
            shopBtn.addEventListener('click', toggleShop);
        }

        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.body.classList.add('is-touch');
        }

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Constants
        const GRAVITY = 0.55;
        const JUMP_FORCE = -12.5;
        const MOVE_SPEED = 7;
        const DRONE_SPEED = 2.5;
        const DRONE_TRACK_SPEED = 0.06;
        const PLAYER_SIZE_W = 30;
        const PLAYER_SIZE_H = 30;

        // Game State
        let floor = 1;
        let health = 100;
        let invincibilityFrames = 0;
        let pixelCoins = 0;
        let player = { 
            x: 100, y: 0, vx: 0, vy: 0, w: PLAYER_SIZE_W, h: PLAYER_SIZE_H, 
            grounded: false, jumps: 0, facing: 1,
            isAttacking: false, attackTimer: 0, attackType: 'normal',
            charge: 0, isCharging: false, isDashing: false, dashTimer: 0,
            weapon: 'sword', hasBow: false, chargeSpeed: 1, damageResist: 1
        };
        let arrows = [];
        let selectedShopItem = -1;
        let platforms = [];
        let spikes = [];
        let lasers = [];
        let crushers = [];
        let saws = [];
        let enemies = [];
        let coins = [];
        let particles = [];
        let buildings = [];
        let cameraX = 0;
        let cameraY = 0;
        let keys = {};
        let frameCount = 0;
        let transitionAlpha = 0;
        let isTransitioning = false;
        let currentWave = 0;
        let totalWaves = 3;
        let arenaActive = false;
        let arenaCleared = false;
        let waveTransition = false;
        let showShop = false;
        let coinsAtArenaStart = 0;
        let isElevatorRising = false;
        let elevatorY = 0;
        let shopItems = [
            { name: 'NEON BOW', price: 100, desc: 'RANGED WEAPON', action: () => { player.hasBow = true; player.weapon = 'bow'; updateHotbar(); } },
            { name: 'POWER CORE', price: 100, desc: 'FASTER CHARGE', action: () => { player.chargeSpeed = 2; } },
            { name: 'SHIELD', price: 150, desc: 'REDUCE DAMAGE', action: () => { player.damageResist = 0.5; } }
        ];
        let coins_collected = 0;

        let stars = [];
        function initStars() {
            stars = [];
            for(let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * 5000,
                    y: Math.random() * height,
                    size: Math.random() * 2,
                    speed: 0.005 + Math.random() * 0.02
                });
            }
        }

        function initBuildings() {
            buildings = [];
            const colors = ['#8b5cf6', '#1e1b4b', '#00f2ff'];
            
            // Tower Interior Walls (Background)
            for(let i = 0; i < 10; i++) {
                buildings.push({
                    x: i * 1000,
                    y: -2000,
                    w: 1000,
                    h: 10000,
                    parallax: 0.05,
                    color: '#050510',
                    isWall: true,
                    bricks: Array.from({length: 300}, () => ({
                        x: Math.random(),
                        y: Math.random(),
                        w: 0.04 + Math.random() * 0.08,
                        h: 0.004,
                        color: Math.random() > 0.85 ? colors[Math.floor(Math.random() * colors.length)] : 'rgba(255,255,255,0.03)'
                    })),
                    windows: Array.from({length: 40}, () => ({
                        x: 0.1 + Math.random() * 0.8,
                        y: Math.random(),
                        w: 0.08,
                        h: 0.015,
                        on: Math.random() > 0.4
                    })),
                    pipes: Array.from({length: 5}, () => ({
                        x: Math.random(),
                        w: 0.01 + Math.random() * 0.02,
                        color: Math.random() > 0.5 ? '#1e1b4b' : '#2d2d4d'
                    }))
                });
            }

            // Structural Girders
            for(let i = 0; i < 15; i++) {
                const parallax = 0.08 + Math.random() * 0.04;
                buildings.push({
                    x: Math.random() * 10000,
                    y: -2000,
                    w: 60 + Math.random() * 40,
                    h: 10000,
                    parallax: parallax,
                    color: '#111122',
                    isBeam: true,
                    glowColor: colors[Math.floor(Math.random() * colors.length)],
                    crossbeams: Array.from({length: 50}, () => ({
                        y: Math.random(),
                        h: 0.002
                    }))
                });
            }
        }

        function generateFloor(num) {
            platforms = [];
            spikes = [];
            lasers = [];
            crushers = [];
            saws = [];
            enemies = [];
            coins = [];
            arenaActive = false;
            waveTransition = false;
            arenaCleared = false;
            
            let curX = 0;
            let curY = height - 150;

            if (num === 1) {
                // Floor 1: Lobby
                platforms.push({ x: -200, y: curY, w: 1000, h: 150 });
                platforms.push({ x: 950, y: curY, w: 300, h: 40 }); // Small gap
                platforms.push({ x: 1650, y: curY, w: 300, h: 40 }); // Large gap
                platforms.push({ x: 2100, y: curY - 60, w: 300, h: 40 }); // Raised
                spikes.push({ x: 2200, y: curY - 75, w: 100, h: 15 });
                
                platforms.push({ x: 2500, y: curY - 60, w: 400, h: 40 }); // Added platform for drone
                enemies.push({ 
                    x: 2550, y: curY - 150, w: 30, h: 30, vx: DRONE_SPEED, 
                    platform: { x: 2500, w: 400 }, health: 1, type: 'drone', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED 
                });
                platforms.push({ x: 3000, y: curY - 60, w: 200, h: 40, type: 'goal' });

            } else if (num === 2) {
                // Floor 2: Maintenance Floor
                platforms.push({ x: -200, y: curY, w: 600, h: 150 });
                lasers.push({ x: 600, y: curY - 300, w: 16, h: 300, state: 'off', timer: 0, cycle: 120 }); // Horizontal laser (cycles every 2s at 60fps)
                platforms.push({ x: 800, y: curY, w: 300, h: 40 });
                platforms.push({ x: 1300, y: curY - 100, w: 300, h: 40 }); // Medium gap
                lasers.push({ x: 1450, y: curY - 400, w: 16, h: 300, state: 'off', timer: 0, cycle: 240 }); // Vertical laser slowly
                
                platforms.push({ x: 1700, y: curY, w: 700, h: 40 }); // Missing platform
                platforms.push({ x: 2100, y: curY - 100, w: 300, h: 40 }); // Extra platform to bridge the gap
                
                enemies.push({ 
                    x: 1800, y: curY - 50, w: 30, h: 30, vx: DRONE_SPEED, 
                    platform: { x: 1700, w: 700 }, health: 1, type: 'drone', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED 
                });
                enemies.push({ 
                    x: 2100, y: curY - 250, w: 30, h: 30, vx: -DRONE_SPEED, 
                    platform: { x: 1700, w: 700 }, health: 1, type: 'drone', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED 
                });

                // Staircase
                platforms.push({ x: 2500, y: curY, w: 150, h: 40 });
                platforms.push({ x: 2650, y: curY - 60, w: 150, h: 40 });
                platforms.push({ x: 2800, y: curY - 120, w: 150, h: 40 });
                platforms.push({ x: 3000, y: curY - 120, w: 200, h: 40, type: 'goal' });

            } else if (num === 3) {
                // Floor 3: Service Shaft
                platforms.push({ x: -200, y: curY, w: 600, h: 150 });
                // Narrow corridor (implied by low ceiling if we had one, but we'll use tight platforms)
                platforms.push({ x: 500, y: curY, w: 400, h: 40 });
                crushers.push({ x: 650, y: curY - 300, w: 80, h: 100, startY: curY - 300, targetY: curY - 80, state: 'waiting', timer: 0, speed: 2 });
                
                platforms.push({ x: 1100, y: curY - 100, w: 200, h: 40 }); // Medium gap
                platforms.push({ x: 1500, y: curY, w: 200, h: 40, type: 'moving', startY: curY, range: 150, speed: 0.04 }); // Moving platform over pit
                
                platforms.push({ x: 1900, y: curY, w: 600, h: 40 });
                lasers.push({ x: 2100, y: curY - 300, w: 16, h: 300, state: 'off', timer: 0, cycle: 120 });
                lasers.push({ x: 2300, y: curY - 300, w: 16, h: 300, state: 'off', timer: 60, cycle: 120 });

                // Arena
                platforms.push({ x: 2700, y: curY, w: 1200, h: 150 });
                platforms.push({ x: 2660, y: curY - 800, w: 40, h: 800, isWall: true });
                platforms.push({ x: 3900, y: curY - 800, w: 40, h: 800, isWall: true });
                
                arenaActive = true;
                currentWave = 1;
                totalWaves = 2;
                coinsAtArenaStart = coins_collected;
                spawnWave(currentWave);

            } else if (num === 4) {
                // Floor 4: Reactor Access
                platforms.push({ x: -200, y: curY, w: 600, h: 150 });
                platforms.push({ x: 500, y: curY - 50, w: 150, h: 40 }); // Short hop
                lasers.push({ x: 750, y: curY - 300, w: 16, h: 300, state: 'off', timer: 0, cycle: 90 }); // Fast laser (1.5s)
                
                platforms.push({ x: 900, y: curY, w: 400, h: 40 });
                crushers.push({ x: 1050, y: curY - 300, w: 80, h: 100, startY: curY - 300, targetY: curY - 80, state: 'waiting', timer: 0, speed: 5 });
                lasers.push({ x: 1082, y: curY - 300, w: 16, h: 300, state: 'off', timer: 0, cycle: 120, syncWithCrusher: true });

                // Rhythm jump sequence
                platforms.push({ x: 1500, y: curY, w: 80, h: 40 });
                platforms.push({ x: 1750, y: curY - 80, w: 80, h: 40 });
                platforms.push({ x: 2000, y: curY - 160, w: 150, h: 40 });

                enemies.push({ 
                    x: 2300, y: curY - 200, w: 30, h: 30, vx: DRONE_SPEED * 1.5, 
                    platform: { x: 2100, w: 600 }, health: 2, type: 'drone', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED 
                });
                enemies.push({ 
                    x: 2500, y: curY - 100, w: 30, h: 30, vx: -DRONE_SPEED, 
                    platform: { x: 2100, w: 600 }, health: 3, type: 'shield', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED 
                });

                platforms.push({ x: 2800, y: curY, w: 600, h: 40 });
                spikes.push({ x: 2900, y: curY - 15, w: 400, h: 15 });
                platforms.push({ x: 3500, y: curY, w: 200, h: 40, type: 'goal' });

            } else if (num === 5) {
                // Floor 5: Security Floor
                platforms.push({ x: -200, y: curY, w: 600, h: 150 });
                platforms.push({ x: 500, y: curY - 200, w: 200, h: 40 }); // Immediate double jump
                
                // Vertical laser grid
                platforms.push({ x: 850, y: curY - 200, w: 60, h: 40 }); // Tiny platform
                lasers.push({ x: 800, y: curY - 500, w: 16, h: 500, state: 'off', timer: 0, cycle: 120 });
                lasers.push({ x: 872, y: curY - 500, w: 16, h: 500, state: 'off', timer: 40, cycle: 120 });
                lasers.push({ x: 944, y: curY - 500, w: 16, h: 500, state: 'off', timer: 80, cycle: 120 });

                platforms.push({ x: 1100, y: curY, w: 800, h: 40 });
                crushers.push({ x: 1300, y: curY - 300, w: 80, h: 100, startY: curY - 300, targetY: curY - 80, state: 'waiting', timer: 0 });
                crushers.push({ x: 1600, y: curY - 300, w: 80, h: 100, startY: curY - 300, targetY: curY - 80, state: 'waiting', timer: 60 });

                platforms.push({ x: 2100, y: curY, w: 200, h: 40 });
                // Long gap requiring dash
                platforms.push({ x: 2800, y: curY, w: 1200, h: 150 });
                
                enemies.push({ x: 2900, y: curY - 100, w: 30, h: 30, vx: DRONE_SPEED * 2, platform: { x: 2800, w: 1200 }, health: 2, type: 'drone', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED * 1.5 });
                enemies.push({ x: 3500, y: curY - 100, w: 30, h: 30, vx: -DRONE_SPEED * 2, platform: { x: 2800, w: 1200 }, health: 2, type: 'drone', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED * 1.5 });
                enemies.push({ x: 3200, y: curY - 50, w: 30, h: 30, vx: 0, platform: { x: 2800, w: 1200 }, health: 4, type: 'shield', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED });

                // Arena
                platforms.push({ x: 2760, y: curY - 800, w: 40, h: 800, isWall: true });
                platforms.push({ x: 4000, y: curY - 800, w: 40, h: 800, isWall: true });
                
                arenaActive = true;
                currentWave = 1;
                totalWaves = 2;
                coinsAtArenaStart = coins_collected;
                spawnWave(currentWave);
            } else {
                // Procedural fallback
                platforms.push({ x: -200, y: curY, w: 600, h: 150 });
                platforms.push({ x: 1000, y: curY, w: 200, h: 40, type: 'goal' });
            }
        }

        function spawnWave(waveNum) {
            enemies = [];
            waveTransition = false;
            const arenaY = height - 150;
            const arenaX = floor === 3 ? 2700 : 2800;
            const arenaW = 1200;

            if (floor === 3) {
                if (waveNum === 1) {
                    enemies.push({ x: arenaX + 200, y: arenaY - 50, w: 30, h: 30, vx: DRONE_SPEED, platform: { x: arenaX, w: arenaW }, health: 1, type: 'drone', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED });

                    enemies.push({ x: arenaX + 900, y: arenaY - 100, w: 30, h: 30, vx: -DRONE_SPEED * 2, platform: { x: arenaX, w: arenaW }, health: 2, type: 'drone', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED * 1.5 });
                    enemies.push({ x: arenaX + 600, y: arenaY - 50, w: 30, h: 30, vx: 0, platform: { x: arenaX, w: arenaW }, health: 4, type: 'shield', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED });
                } else {
                    enemies.push({ x: arenaX + 200, y: arenaY - 100, w: 30, h: 30, vx: DRONE_SPEED * 1.5, platform: { x: arenaX, w: arenaW }, health: 2, type: 'drone', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED });
                    enemies.push({ x: arenaX + 500, y: arenaY - 100, w: 30, h: 30, vx: DRONE_SPEED * 1.5, platform: { x: arenaX, w: arenaW }, health: 2, type: 'drone', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED });
                    enemies.push({ x: arenaX + 800, y: arenaY - 100, w: 30, h: 30, vx: DRONE_SPEED * 1.5, platform: { x: arenaX, w: arenaW }, health: 2, type: 'drone', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED });
                    enemies.push({ x: arenaX + 600, y: arenaY - 300, w: 45, h: 45, vx: DRONE_SPEED * 2.5, platform: { x: arenaX, w: arenaW }, health: 8, type: 'drone', verticalTracking: true, trackSpeed: DRONE_TRACK_SPEED * 2, isElite: true });

        function resetPlayer() {
            const startPlatform = platforms[0] || { y: height - 150 };
            player.x = 100;
            player.y = startPlatform.y - player.h - 150;
            player.vx = 0;
            player.vy = 0;
            player.jumps = 0;
            player.facing = 1;
            player.isAttacking = false;
            player.attackTimer = 0;
            player.isCharging = false;
            player.charge = 0;
            player.isDashing = false;
            player.dashTimer = 0;
            player.chargeSpeed = 1;
            player.damageResist = 1.0;
            health = 100;
            if (healthBar) healthBar.style.width = '100%';
            if (chargeBar) chargeBar.style.width = '0%';
            isTransitioning = false;
            transitionAlpha = 0;
            isElevatorRising = false;
            
            if (arenaActive) {
                coins_collected = coinsAtArenaStart;
                const coinVal = document.getElementById('coin-val');
                if (coinVal) coinVal.innerText = coins_collected.toString().padStart(4, '0');
                spawnWave(currentWave);
            }
        }

        function advanceFloor() {
            if (isTransitioning) return;
            isTransitioning = true;
            isElevatorRising = true;
            elevatorY = 0;
            showMsg("ASCENDING TO FLOOR " + (floor + 1));
            
            let fadeOut = setInterval(() => {
                transitionAlpha += 0.02;
                elevatorY -= 10;
                if (transitionAlpha >= 1) {
                    clearInterval(fadeOut);
                    floor++;
                    const sectorVal = document.getElementById('sector-val');
                    if (sectorVal) sectorVal.innerText = floor < 10 ? '0' + floor : floor;
                    generateFloor(floor);
                    resetPlayer();
                }
            }, 30);
        }

        function showMsg(txt) {
            message.innerText = txt;
            message.classList.add('active');
            setTimeout(() => message.classList.remove('active'), 2500);
        }

        // Controls
        window.addEventListener('keydown', e => {
            if (isTransitioning) return;
            if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
                if (player.grounded) {
                    player.vy = JUMP_FORCE;
                    player.grounded = false;
                    player.jumps = 1;
                } else if (player.jumps < 2) {
                    player.vy = JUMP_FORCE * 0.85;
                    player.jumps = 2;
                    createParticles(player.x + player.w/2, player.y + player.h, varColor('--neon-cyan'), 5);
                }
            }
            if (e.code === 'KeyJ' || e.code === 'KeyK' || e.code === 'KeyF') {
                if (!player.isCharging && !player.isAttacking && !player.isDashing) {
                    player.isCharging = true;
                    player.charge = 0;
                }
            }
            
            // Shop Keys
            if (showShop) {
                if (e.key === '1') buyItem(0);
                if (e.key === '2') buyItem(1);
                if (e.key === '3') buyItem(2);
            }
            keys[e.code] = true;
        });

        function buyItem(idx) {
            const item = shopItems[idx];
            if (selectedShopItem === idx) {
                if (coins_collected >= item.price) {
                    coins_collected -= item.price;
                    item.action();
                    const coinVal = document.getElementById('coin-val');
                    if (coinVal) coinVal.innerText = coins_collected.toString().padStart(4, '0');
                    showMsg("PURCHASED: " + item.name);
                    selectedShopItem = -1;
                } else {
                    showMsg("INSUFFICIENT COINS");
                    selectedShopItem = -1;
                }
            } else {
                selectedShopItem = idx;
                showMsg("CONFIRM PURCHASE: " + item.name);
            }
        }
        window.addEventListener('keyup', e => {
            if (e.code === 'KeyJ' || e.code === 'KeyK' || e.code === 'KeyF') {
                if (player.isCharging) {
                    if (player.weapon === 'bow') {
                        fireBow();
                    } else {
                        if (player.charge >= 60) {
                            startDashAttack();
                        } else {
                            startNormalAttack();
                        }
                    }
                    player.isCharging = false;
                    player.charge = 0;
                    if (chargeBar) chargeBar.style.width = '0%';
                }
            }
            keys[e.code] = false;
        });

        function startNormalAttack() {
            player.isAttacking = true;
            player.attackTimer = 15;
            player.attackType = 'normal';
        }

        function startDashAttack() {
            player.isDashing = true;
            player.dashTimer = 20;
            player.attackType = 'dash';
            player.vx = player.facing * 25;
            player.vy = 0;
            createParticles(player.x, player.y + player.h/2, varColor('--neon-pink'), 10);
        }

        function fireBow() {
            const chargeFactor = player.charge / 100;
            const speed = 12 + chargeFactor * 18;
            const damage = 1 + chargeFactor * 4;
            arrows.push({
                x: player.x + player.w/2,
                y: player.y + player.h/2,
                vx: player.facing * speed,
                vy: -1.5,
                damage: damage
            });
            player.charge = 0;
            if (chargeBar) chargeBar.style.width = '0%';
        }

        function setupMobileBtn(id, key) {
            const btn = document.getElementById(id);
            if (!btn) return;
            btn.addEventListener('touchstart', (e) => { 
                e.preventDefault(); 
                if (isTransitioning) return;
                
                if (id === 'btn-attack') {
                    if (!player.isCharging && !player.isAttacking && !player.isDashing) {
                        player.isCharging = true;
                        player.charge = 0;
                    }
                    return;
                }

                if (key === 'Space') {
                    if (player.grounded) {
                        player.vy = JUMP_FORCE;
                        player.grounded = false;
                        player.jumps = 1;
                    } else if (player.jumps < 2) {
                        player.vy = JUMP_FORCE * 0.85;
                        player.jumps = 2;
                        createParticles(player.x + player.w/2, player.y + player.h, varColor('--neon-cyan'), 5);
                    }
                }
                keys[key] = true; 
            }, { passive: false });
            btn.addEventListener('touchend', (e) => { 
                e.preventDefault(); 
                if (id === 'btn-attack') {
                    if (player.isCharging) {
                        if (player.weapon === 'bow') {
                            fireBow();
                        } else {
                            if (player.charge >= 60) {
                                startDashAttack();
                            } else {
                                startNormalAttack();
                            }
                        }
                        player.isCharging = false;
                        player.charge = 0;
                        if (chargeBar) chargeBar.style.width = '0%';
                    }
                    return;
                }
                keys[key] = false; 
            }, { passive: false });
        }
        setupMobileBtn('btn-left', 'KeyA');
        setupMobileBtn('btn-right', 'KeyD');
        setupMobileBtn('btn-jump', 'Space');
        setupMobileBtn('btn-attack', 'KeyJ');

        function createParticles(x, y, color, count) {
            for(let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 1.0,
                    color,
                    size: 2 + Math.random() * 3
                });
            }
        }

        function takeDamage(amt, sourceX) {
            if (invincibilityFrames > 0) return;
            
            health -= amt * (player.damageResist || 1.0);
            invincibilityFrames = 60; // 1 second at 60fps
            player.vy = -12;
            player.vx = (player.x < sourceX) ? -15 : 15;
            createParticles(player.x + player.w/2, player.y + player.h/2, varColor('--neon-pink'), 15);
            if (health <= 0) {
                showMsg("SYSTEM FAILURE");
                resetPlayer();
            }
            if (healthBar) healthBar.style.width = Math.max(0, health) + '%';
        }

        function update() {
            if (isTransitioning) return;
            frameCount++;
            if (invincibilityFrames > 0) invincibilityFrames--;

            // Combat Logic
            if (player.isCharging) {
                player.charge += (player.chargeSpeed || 1);
                const maxCharge = player.weapon === 'bow' ? 100 : 60;
                if (player.charge > maxCharge) player.charge = maxCharge;
                
                if (chargeBar) chargeBar.style.width = Math.min(100, (player.charge / maxCharge) * 100) + '%';
                if (player.charge === maxCharge) {
                    createParticles(player.x + player.w/2, player.y + player.h/2, '#fff', 2);
                }
            }

            if (player.isAttacking) {
                player.attackTimer--;
                if (player.attackTimer <= 0) player.isAttacking = false;
            }

            if (player.isDashing) {
                player.dashTimer--;
                player.vy = 0;
                player.vx = player.facing * 25;
                createParticles(player.x + player.w/2, player.y + player.h/2, varColor('--neon-cyan'), 2);
                if (player.dashTimer <= 0) {
                    player.isDashing = false;
                    player.vx *= 0.5;
                }
            }

            // Movement
            if (!player.isDashing) {
                if (keys['KeyA'] || keys['ArrowLeft']) {
                    player.vx = -MOVE_SPEED;
                    player.facing = -1;
                }
                else if (keys['KeyD'] || keys['ArrowRight']) {
                    player.vx = MOVE_SPEED;
                    player.facing = 1;
                }
                else player.vx *= 0.8;

                player.vy += GRAVITY;
            }

            // Arena Logic
            if (arenaActive) {
                if (enemies.length === 0 && !waveTransition) {
                    if (currentWave < totalWaves) {
                        waveTransition = true;
                        currentWave++;
                        setTimeout(() => spawnWave(currentWave), 1500);
                    } else {
                        arenaActive = false;
                        arenaCleared = true;
                        showMsg("ARENA CLEARED - SHOP OPEN");
                        // Remove walls
                        platforms = platforms.filter(p => !p.isWall);
                        // Add goal platform
                        const arenaX = floor === 3 ? 2700 : 2800;
                        platforms.push({ x: arenaX + 1100, y: height - 150, w: 200, h: 40, type: 'goal' });
                    }
                }
            }
            
            // Shop Interaction
            if (arenaCleared || floor >= 3) {
                if (shopBtn) shopBtn.style.display = 'block';
            } else {
                if (shopBtn) shopBtn.style.display = 'none';
                showShop = false;
            }
            
            player.x += player.vx;
            player.y += player.vy;

            if (isElevatorRising) {
                player.y -= 10;
            }

            // Update Platforms
            platforms.forEach(p => {
                if (p.type === 'moving') {
                    p.y = p.startY + Math.sin(frameCount * p.speed) * p.range;
                }
            });

            // Update Enemies
            enemies.forEach(en => {
                if (en.type === 'drone') {
                    en.x += en.vx;
                    if (en.x < en.platform.x || en.x + en.w > en.platform.x + en.platform.w) {
                        en.vx *= -1;
                    }
                } else if (en.type === 'runner') {
                    const distToPlayer = Math.abs(player.x - en.x);
                    const sameLevel = Math.abs(player.y - en.y) < 100;

                    if (en.state === 'idle') {
                        en.timer++;
                        if (en.timer > 30) {
                            en.state = 'sprinting';
                            en.timer = 0;
                        }
                    } else if (en.state === 'sprinting') {
                        const dir = player.x < en.x ? -1 : 1;
                        en.facing = dir;
                        en.vx = dir * 5;
                        en.x += en.vx;
                        
                        if (distToPlayer < 200 && sameLevel) {
                            en.state = 'preparing';
                            en.timer = 0;
                            en.vx = 0;
                        }
                    } else if (en.state === 'preparing') {
                        en.timer++;
                        if (en.timer > 35) {
                            en.state = 'dashing';
                            en.timer = 0;
                        }
                    } else if (en.state === 'dashing') {
                        en.vx = en.facing * 15;
                        en.x += en.vx;
                        en.timer++;
                        if (en.timer > 15) {
                            en.state = 'cooldown';
                            en.timer = 0;
                        }
                    } else if (en.state === 'cooldown') {
                        en.vx = 0;
                        en.timer++;
                        if (en.timer > 40) {
                            en.state = 'idle';
                            en.timer = 0;
                        }
                    }
                    
                    // Keep on platform
                    if (en.x < en.platform.x) en.x = en.platform.x;
                    if (en.x + en.w > en.platform.x + en.platform.w) en.x = en.platform.x + en.platform.w - en.w;
                }
            });

            // Update Coins
            for (let i = coins.length - 1; i >= 0; i--) {
                const c = coins[i];
                c.y += Math.sin(frameCount * 0.1) * 0.5; // Floating animation
                
                const dx = (player.x + player.w/2) - c.x;
                const dy = (player.y + player.h/2) - c.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist < 50) {
                    coins_collected += 10;
                    if (coinVal) coinVal.innerText = coins_collected.toString().padStart(4, '0');
                    createParticles(c.x, c.y, '#ffd700', 10);
                    coins.splice(i, 1);
                }
            }

            // Update Lasers
            lasers.forEach(l => {
                if (l.syncWithCrusher) {
                    const crusher = crushers.find(c => Math.abs(c.x - (l.x - 32)) < 10);
                    if (crusher) {
                        l.state = crusher.state === 'waiting' ? 'on' : 'off';
                    }
                } else {
                    l.timer++;
                    if (l.timer >= l.cycle) {
                        l.timer = 0;
                        l.state = l.state === 'on' ? 'off' : 'on';
                    }
                }
            });

            // Update Crushers
            crushers.forEach(c => {
                if (c.state === 'waiting') {
                    c.timer++;
                    if (c.timer > 60) { c.state = 'dropping'; c.timer = 0; }
                } else if (c.state === 'dropping') {
                    c.y += (c.speed || 18);
                    if (c.y >= c.targetY) { c.y = c.targetY; c.state = 'rising'; }
                } else if (c.state === 'rising') {
                    c.y -= 2.5;
                    if (c.y <= c.startY) { c.y = c.startY; c.state = 'waiting'; }
                }
            });

            // Update Saws
            saws.forEach(s => {
                s.angle += s.speed;
                s.x = s.startX + Math.cos(s.angle) * s.range;
            });

            // Collisions
            player.grounded = false;
            platforms.forEach(p => {
                if (p.type === 'fading' && p.opacity < 0.1) return;

                if (player.x + player.w > p.x && player.x < p.x + p.w &&
                    player.y + player.h > p.y && player.y < p.y + p.h) {
                    
                    if (player.vy > 0 && player.y + player.h - player.vy <= p.y + 15) {
                        player.y = p.y - player.h;
                        player.vy = 0;
                        player.grounded = true;
                        player.jumps = 0;

                        if (p.type === 'fading') p.opacity -= 0.08;
                        if (p.type === 'goal') advanceFloor();
                    } 
                    else if (player.vx > 0 && player.x + player.w - player.vx <= p.x) {
                        player.x = p.x - player.w; player.vx = 0;
                    } else if (player.vx < 0 && player.x - player.vx >= p.x + p.w) {
                        player.x = p.x + p.w; player.vx = 0;
                    }
                    else if (player.vy < 0 && player.y - player.vy >= p.y + p.h - 15) {
                        player.y = p.y + p.h; player.vy = 0;
                    }
                } else if (p.type === 'fading' && p.opacity < 1) {
                    p.opacity += 0.004;
                }
            });

            // Hazards
            spikes.forEach(s => {
                if (player.x + player.w > s.x && player.x < s.x + s.w &&
                    player.y + player.h > s.y && player.y < s.y + s.h) {
                    takeDamage(15, s.x);
                }
            });

            lasers.forEach(l => {
                if (l.state === 'on' && 
                    player.x + player.w > l.x && player.x < l.x + l.w &&
                    player.y + player.h > l.y && player.y < l.y + l.h) {
                    takeDamage(25, l.x);
                }
            });

            crushers.forEach(c => {
                if (player.x + player.w > c.x && player.x < c.x + c.w &&
                    player.y + player.h > c.y && player.y < c.y + c.h) {
                    takeDamage(40, c.x);
                }
            });

            saws.forEach(s => {
                const dx = (player.x + player.w/2) - s.x;
                const dy = (player.y + player.h/2) - s.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < s.r + 10) {
                    takeDamage(30, s.x);
                }
            });

            // Enemy Collision & Combat
            for (let i = enemies.length - 1; i >= 0; i--) {
                const en = enemies[i];
                
                // AI Logic
                if (en.type === 'drone' || en.type === 'shield') {
                    // Vertical tracking
                    if (en.verticalTracking) {
                        const targetY = player.y + (en.hoverOffset || 0);
                        const dx = player.x - en.x;
                        const dy = targetY - en.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < 800) {
                            // Normalized tracking for balanced speed in all directions
                            const speed = (en.trackSpeed || 0.05) * 100;
                            const vx_target = (dx / dist) * speed;
                            const vy_target = (dy / dist) * speed;
                            
                            en.vx += (vx_target - en.vx) * 0.1;
                            en.y += (vy_target) * 0.5; // Direct vertical movement for responsiveness
                        } else {
                            en.vx *= 0.95;
                        }
                    }
                    
                    en.x += en.vx;
                    if (!en.verticalTracking) {
                        if (en.x < en.platform.x || en.x + en.w > en.platform.x + en.platform.w) {
                            en.vx *= -1;
                        }
                    } else {
                        // Loose leash
                        if (en.x < en.platform.x - 300) { en.x = en.platform.x - 300; en.vx *= -0.5; }
                        if (en.x + en.w > en.platform.x + en.platform.w + 300) { en.x = en.platform.x + en.platform.w + 300 - en.w; en.vx *= -0.5; }
                    }
                } else if (en.type === 'runner') {
                    const distToPlayer = Math.abs(player.x - en.x);
                    const sameLevel = Math.abs(player.y - en.y) < 100;

                    if (en.state === 'idle') {
                        en.timer++;
                        if (en.timer > 30) {
                            en.state = 'sprinting';
                            en.timer = 0;
                        }
                    } else if (en.state === 'sprinting') {
                        const dir = player.x < en.x ? -1 : 1;
                        en.facing = dir;
                        en.vx = dir * 5;
                        en.x += en.vx;
                        
                        if (distToPlayer < 200 && sameLevel) {
                            en.state = 'preparing';
                            en.timer = 0;
                            en.vx = 0;
                        }
                    } else if (en.state === 'preparing') {
                        en.timer++;
                        if (en.timer > 35) {
                            en.state = 'dashing';
                            en.timer = 0;
                        }
                    } else if (en.state === 'dashing') {
                        en.vx = en.facing * 15;
                        en.x += en.vx;
                        en.timer++;
                        if (en.timer > 15) {
                            en.state = 'cooldown';
                            en.timer = 0;
                        }
                    } else if (en.state === 'cooldown') {
                        en.vx = 0;
                        en.timer++;
                        if (en.timer > 40) {
                            en.state = 'idle';
                            en.timer = 0;
                        }
                    }
                    
                    // Keep on platform
                    if (en.x < en.platform.x) en.x = en.platform.x;
                    if (en.x + en.w > en.platform.x + en.platform.w) en.x = en.platform.x + en.platform.w - en.w;
                }

                // Player hits enemy
                if (player.isAttacking || player.isDashing) {
                    const attackRange = player.isDashing ? 80 : 70;
                    const dx = (player.x + player.w/2) - (en.x + en.w/2);
                    const dy = (player.y + player.h/2) - (en.y + en.h/2);
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    // More forgiving hitbox for drones
                    const hitRange = (en.type === 'drone' || en.type === 'shield') ? attackRange + 20 : attackRange;
                    
                    if (dist < hitRange) {
                        // Shield check
                        if (en.type === 'shield') {
                            const playerBehind = (en.vx > 0 && player.x > en.x) || (en.vx < 0 && player.x < en.x);
                            if (!playerBehind) {
                                createParticles(en.x + en.w/2, en.y + en.h/2, '#555', 5);
                                player.vx = -player.facing * 10; // Strong recoil
                                continue;
                            }
                        }

                        const isDashHit = player.isDashing;
                        const damage = isDashHit ? 2 : 1;
                        
                        en.health -= damage;
                        if (en.health <= 0) {
                            createParticles(en.x + en.w/2, en.y + en.h/2, varColor('--neon-cyan'), 15);
                            coins.push({ x: en.x + en.w/2, y: en.y + en.h/2 });
                            enemies.splice(i, 1);
                        } else {
                            createParticles(en.x + en.w/2, en.y + en.h/2, '#fff', 5);
                            en.vx = player.facing * 10; // Knockback
                        }
                        
                        if (!player.isDashing) {
                            player.vx = -player.facing * 5; // Slight recoil
                        }
                        continue;
                    }
                }

                // Enemy hits player
                if (player.x + player.w > en.x && player.x < en.x + en.w &&
                    player.y + player.h > en.y && player.y < en.y + en.h) {
                    if (!player.isDashing) {
                        if (en.type === 'drone' || en.type === 'shield') {
                            takeDamage(10, en.x);
                        } else if (en.type === 'runner' && en.state === 'dashing') {
                            takeDamage(10, en.x);
                        }
                    }
                }
            }

            // Particles
            for(let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            }

            // Update Arrows
            for (let i = arrows.length - 1; i >= 0; i--) {
                const a = arrows[i];
                a.x += a.vx;
                a.y += a.vy;
                a.vy += 0.15; // Gravity for arrows
                
                // Collision with enemies
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const en = enemies[j];
                    if (a.x > en.x && a.x < en.x + en.w && a.y > en.y && a.y < en.y + en.h) {
                        // Shield check
                        if (en.type === 'shield') {
                            const arrowFromFront = (a.vx > 0 && a.x < en.x + en.w/2) || (a.vx < 0 && a.x > en.x + en.w/2);
                            if (arrowFromFront) {
                                createParticles(a.x, a.y, '#555', 5);
                                arrows.splice(i, 1);
                                break;
                            }
                        }

                        en.health -= a.damage;
                        createParticles(a.x, a.y, varColor('--neon-cyan'), 10);
                        if (en.health <= 0) {
                            createParticles(en.x + en.w/2, en.y + en.h/2, varColor('--neon-cyan'), 15);
                            coins_collected += en.isElite ? 50 : 10;
                            const coinVal = document.getElementById('coin-val');
                            if (coinVal) coinVal.innerText = coins_collected.toString().padStart(4, '0');
                            enemies.splice(j, 1);
                        }
                        arrows.splice(i, 1);
                        break;
                    }
                }
                
                // Collision with platforms
                platforms.forEach(p => {
                    if (a.x > p.x && a.x < p.x + p.w && a.y > p.y && a.y < p.y + p.h) {
                        arrows.splice(i, 1);
                    }
                });
                
                // Remove out of bounds
                if (a.x < player.x - width || a.x > player.x + width || a.y > height + 500) {
                    if (arrows[i]) arrows.splice(i, 1);
                }
            }

            // Fall off
            if (player.y > height + 500) {
                showMsg("REBOOTING...");
                resetPlayer();
            }

            // Camera
            cameraX += (width/3 - player.x - cameraX) * 0.1;
            cameraY += (height/2 - player.y - cameraY) * 0.1;
        }

        function draw() {
            // Background Gradient: Dark Blue to Purple
            const bgGrad = ctx.createLinearGradient(0, 0, 0, height);
            bgGrad.addColorStop(0, '#020205');
            bgGrad.addColorStop(0.6, '#05051a');
            bgGrad.addColorStop(1, '#1a0525');
            ctx.fillStyle = bgGrad;
            ctx.fillRect(0, 0, width, height);

            // Stars
            ctx.fillStyle = '#fff';
            stars.forEach(s => {
                const sx = (s.x + cameraX * s.speed) % 5000;
                const drawX = sx < 0 ? sx + 5000 : sx;
                ctx.globalAlpha = 0.3 + Math.sin(frameCount * 0.05 + s.x) * 0.2;
                ctx.fillRect(drawX, s.y, s.size, s.size);
            });
            ctx.globalAlpha = 1.0;
            
            ctx.strokeStyle = 'rgba(0, 242, 255, 0.03)';
            ctx.lineWidth = 1;
            const gridSize = 60;
            const offsetX = cameraX % gridSize;
            const offsetY = cameraY % gridSize;
            
            ctx.beginPath();
            for(let x = offsetX; x < width; x += gridSize) {
                ctx.moveTo(x, 0); ctx.lineTo(x, height);
            }
            for(let y = offsetY; y < height; y += gridSize) {
                ctx.moveTo(0, y); ctx.lineTo(width, y);
            }
            ctx.stroke();

            // Buildings (Tower Background)
            buildings.forEach(b => {
                const bx = (b.x + cameraX * b.parallax) % 5000;
                const drawX = bx < -b.w ? bx + 5000 : bx;
                const drawY = b.y + cameraY * b.parallax;
                
                if (b.isWall) {
                    ctx.fillStyle = b.color;
                    ctx.fillRect(drawX, drawY, b.w, b.h);
                    
                    // Panels / Large Bricks
                    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
                    ctx.lineWidth = 1;
                    for(let px = 0; px < b.w; px += 200) {
                        ctx.strokeRect(drawX + px, drawY, 200, b.h);
                    }

                    // Pipes
                    b.pipes.forEach(p => {
                        ctx.fillStyle = p.color;
                        ctx.fillRect(drawX + p.x * b.w, drawY, p.w * b.w, b.h);
                        // Pipe highlights
                        ctx.fillStyle = 'rgba(255,255,255,0.05)';
                        ctx.fillRect(drawX + p.x * b.w, drawY, (p.w * b.w) / 3, b.h);
                    });

                    // Bricks (Neon highlights)
                    b.bricks.forEach(br => {
                        ctx.fillStyle = br.color;
                        ctx.fillRect(drawX + br.x * b.w, drawY + br.y * b.h, br.w * b.w, br.h * b.h);
                        if (br.color !== 'rgba(255,255,255,0.03)') {
                            ctx.shadowBlur = 5;
                            ctx.shadowColor = br.color;
                            ctx.fillRect(drawX + br.x * b.w, drawY + br.y * b.h, br.w * b.w, br.h * b.h);
                            ctx.shadowBlur = 0;
                        }
                    });

                    // Windows
                    b.windows.forEach(w => {
                        if (w.on) {
                            ctx.fillStyle = 'rgba(0, 242, 255, 0.15)';
                            ctx.fillRect(drawX + w.x * b.w, drawY + w.y * b.h, w.w * b.w, w.h * b.h);
                            ctx.strokeStyle = 'rgba(0, 242, 255, 0.4)';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(drawX + w.x * b.w, drawY + w.y * b.h, w.w * b.w, w.h * b.h);
                            
                            // Window frame/glow
                            ctx.shadowBlur = 5;
                            ctx.shadowColor = '#00f2ff';
                            ctx.strokeRect(drawX + w.x * b.w, drawY + w.y * b.h, w.w * b.w, w.h * b.h);
                            ctx.shadowBlur = 0;
                        }
                    });
                } else if (b.isBeam) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = b.glowColor;
                    ctx.fillStyle = b.color;
                    ctx.fillRect(drawX, drawY, b.w, b.h);
                    
                    // Crossbeams
                    ctx.fillStyle = 'rgba(255,255,255,0.05)';
                    b.crossbeams.forEach(cb => {
                        ctx.fillRect(drawX, drawY + cb.y * b.h, b.w, cb.h * b.h);
                    });

                    ctx.strokeStyle = b.glowColor;
                    ctx.lineWidth = 2;
                    ctx.strokeRect(drawX, drawY, b.w, b.h);
                    ctx.shadowBlur = 0;
                }
            });

            // Tower Walls (Foreground Parallax)
            ctx.fillStyle = '#050510';
            ctx.strokeStyle = '#1a1a2e';
            ctx.lineWidth = 5;
            const wallWidth = 100;
            const wallParallax = 0.1;
            const wallX = (-cameraX * wallParallax) % 2000;
            for(let i = -1; i < 3; i++) {
                const x = wallX + i * 2000;
                ctx.fillRect(x, 0, wallWidth, height);
                ctx.strokeRect(x, 0, wallWidth, height);
                ctx.fillRect(x + 1900, 0, wallWidth, height);
                ctx.strokeRect(x + 1900, 0, wallWidth, height);
            }

            ctx.save();
            ctx.translate(cameraX, cameraY);

            // Platforms
            platforms.forEach(p => {
                if (p.type === 'goal') {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 3;
                    
                    const elevX = p.x;
                    const elevY = p.y + (isElevatorRising ? elevatorY : 0);
                    
                    ctx.fillRect(elevX, elevY, p.w, p.h);
                    ctx.strokeRect(elevX, elevY, p.w, p.h);
                    
                    // Shaft visual
                    ctx.beginPath();
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.moveTo(elevX, elevY); ctx.lineTo(elevX, elevY - 1000);
                    ctx.moveTo(elevX + p.w, elevY); ctx.lineTo(elevX + p.w, elevY - 1000);
                    ctx.stroke();

                    ctx.fillStyle = '#fff';
                    ctx.font = 'bold 16px Orbitron';
                    ctx.textAlign = 'center';
                    ctx.fillText('ASCEND', elevX + p.w/2, elevY + 25);
                } else if (p.type === 'block') {
                    ctx.fillStyle = '#111';
                    ctx.strokeStyle = varColor('--neon-cyan');
                    ctx.lineWidth = 2;
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.strokeRect(p.x, p.y, p.w, p.h);
                } else if (p.type === 'moving') {
                    ctx.fillStyle = '#000';
                    ctx.strokeStyle = varColor('--neon-cyan');
                    ctx.lineWidth = 3;
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.strokeRect(p.x, p.y, p.w, p.h);
                } else if (p.type === 'fading') {
                    ctx.globalAlpha = p.opacity;
                    ctx.fillStyle = '#000';
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 1;
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.strokeRect(p.x, p.y, p.w, p.h);
                    ctx.globalAlpha = 1.0;
                } else if (p.type === 'shop') {
                    ctx.fillStyle = '#000';
                    ctx.strokeStyle = varColor('--neon-pink');
                    ctx.lineWidth = 3;
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.strokeRect(p.x, p.y, p.w, p.h);
                    
                    ctx.fillStyle = varColor('--neon-pink');
                    ctx.font = 'bold 20px Orbitron';
                    ctx.textAlign = 'center';
                    ctx.fillText('NEON SHOP', p.x + p.w/2, p.y - 40);
                    ctx.font = '12px Orbitron';
                    ctx.fillText('STAND HERE TO BROWSE', p.x + p.w/2, p.y - 20);
                } else {
                    ctx.fillStyle = '#000';
                    ctx.strokeStyle = varColor('--neon-cyan');
                    ctx.lineWidth = 2;
                    ctx.fillRect(p.x, p.y, p.w, p.h);
                    ctx.strokeRect(p.x, p.y, p.w, p.h);
                }
            });

            // Spikes
            spikes.forEach(s => {
                ctx.fillStyle = varColor('--neon-pink');
                ctx.beginPath();
                const step = 15;
                for(let x = s.x; x < s.x + s.w; x += step) {
                    ctx.moveTo(x, s.y + s.h);
                    ctx.lineTo(x + step/2, s.y);
                    ctx.lineTo(x + step, s.y + s.h);
                }
                ctx.fill();
            });

            // Lasers
            lasers.forEach(l => {
                if (l.state === 'on') {
                    ctx.fillStyle = varColor('--neon-pink');
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = varColor('--neon-pink');
                    ctx.fillRect(l.x, l.y, l.w, l.h);
                    ctx.shadowBlur = 0;
                } else {
                    ctx.strokeStyle = 'rgba(255, 0, 85, 0.6)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([5, 5]);
                    ctx.strokeRect(l.x, l.y, l.w, l.h);
                    ctx.setLineDash([]);
                    ctx.lineWidth = 1;
                }
            });

            // Crushers
            crushers.forEach(c => {
                ctx.fillStyle = '#111';
                ctx.strokeStyle = varColor('--neon-pink');
                ctx.lineWidth = 3;
                ctx.fillRect(c.x, c.y, c.w, c.h);
                ctx.strokeRect(c.x, c.y, c.w, c.h);
                
                ctx.fillStyle = varColor('--neon-pink');
                for(let tx = c.x; tx < c.x + c.w; tx += 20) {
                    ctx.beginPath();
                    ctx.moveTo(tx, c.y + c.h);
                    ctx.lineTo(tx + 10, c.y + c.h + 15);
                    ctx.lineTo(tx + 20, c.y + c.h);
                    ctx.fill();
                }
            });

            // Saws
            saws.forEach(s => {
                ctx.save();
                ctx.translate(s.x, s.y);
                ctx.rotate(frameCount * 0.2);
                ctx.fillStyle = '#222';
                ctx.strokeStyle = varColor('--neon-pink');
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(0, 0, s.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                
                // Teeth
                ctx.fillStyle = varColor('--neon-pink');
                for(let i = 0; i < 8; i++) {
                    ctx.rotate(Math.PI / 4);
                    ctx.beginPath();
                    ctx.moveTo(s.r - 5, -5);
                    ctx.lineTo(s.r + 15, 0);
                    ctx.lineTo(s.r - 5, 5);
                    ctx.fill();
                }
                ctx.restore();
            });

            // Coins
            coins.forEach(c => {
                ctx.save();
                ctx.translate(c.x, c.y);
                ctx.rotate(frameCount * 0.1);
                ctx.fillStyle = '#ffd700';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.rect(-8, -8, 16, 16);
                ctx.fill();
                ctx.stroke();
                
                // Coin Glow
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ffd700';
                ctx.stroke();
                ctx.restore();
            });

            // Enemies
            enemies.forEach(en => {
                if (en.type === 'drone' || en.type === 'shield') {
                    ctx.fillStyle = '#000';
                    ctx.strokeStyle = en.isElite ? varColor('--neon-cyan') : varColor('--neon-pink');
                    ctx.lineWidth = en.isElite ? 4 : 2;
                    ctx.strokeRect(en.x, en.y, en.w, en.h);
                    
                    if (en.type === 'shield') {
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                        if (en.vx > 0) ctx.fillRect(en.x, en.y, 5, en.h);
                        else ctx.fillRect(en.x + en.w - 5, en.y, 5, en.h);
                    }

                    // Eye
                    ctx.fillStyle = en.isElite ? varColor('--neon-cyan') : varColor('--neon-pink');
                    ctx.fillRect(en.x + (en.vx > 0 ? en.w - 10 : 5), en.y + 10, 5, 5);
                    
                    // Glow
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = en.isElite ? varColor('--neon-cyan') : varColor('--neon-pink');
                    ctx.strokeRect(en.x, en.y, en.w, en.h);
                    ctx.shadowBlur = 0;
                } else if (en.type === 'runner') {
                    ctx.fillStyle = '#000';
                    ctx.strokeStyle = varColor('--neon-pink');
                    ctx.lineWidth = 2;
                    ctx.fillRect(en.x, en.y, en.w, en.h);
                    ctx.strokeRect(en.x, en.y, en.w, en.h);
                    
                    // Eyes/Glow
                    ctx.fillStyle = varColor('--neon-pink');
                    if (en.state === 'preparing') {
                        ctx.globalAlpha = Math.sin(frameCount * 0.5) * 0.5 + 0.5;
                        ctx.fillRect(en.x, en.y, en.w, en.h);
                        ctx.globalAlpha = 1.0;
                    }
                    
                    const eyeX = en.facing === 1 ? en.x + en.w - 10 : en.x + 2;
                    ctx.fillRect(eyeX, en.y + 5, 8, 4);
                    
                    // Dash trail if dashing
                    if (en.state === 'dashing') {
                        ctx.globalAlpha = 0.3;
                        ctx.fillRect(en.x - en.vx * 2, en.y, en.w, en.h);
                        ctx.globalAlpha = 1.0;
                    }
                }
            });

            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1.0;

            // Arrows
            arrows.forEach(a => {
                ctx.strokeStyle = varColor('--neon-pink');
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(a.x + cameraX, a.y + cameraY);
                ctx.lineTo(a.x + cameraX - a.vx * 1.5, a.y + cameraY - a.vy * 1.5);
                ctx.stroke();
            });

            // Player (Cube)
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // Dash trail
            if (player.isDashing) {
                ctx.globalAlpha = 0.5;
                ctx.fillStyle = '#00f2ff';
                ctx.fillRect(-player.vx * 2, -player.vy * 2, player.w, player.h);
                ctx.globalAlpha = 1.0;
            }

            const cubeColor = '#00f2ff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = cubeColor;
            ctx.strokeStyle = cubeColor;
            ctx.lineWidth = 3;
            
            // Draw the cube
            ctx.strokeRect(0, 0, player.w, player.h);
            ctx.fillStyle = 'rgba(0, 242, 255, 0.2)';
            ctx.fillRect(0, 0, player.w, player.h);
            
            ctx.shadowBlur = 0;

            // Sword / Bow (Attached to Cube)
            if (player.weapon === 'sword') {
                if (player.isAttacking || player.isDashing || player.isCharging) {
                    ctx.save();
                    // Attach to the side of the cube
                    ctx.translate(player.facing === 1 ? player.w : 0, player.h / 2);
                    
                    let angle = 0;
                    if (player.isCharging) {
                        angle = -Math.PI / 4;
                    } else if (player.isAttacking) {
                        angle = (1 - player.attackTimer / 15) * Math.PI - Math.PI/2;
                    } else if (player.isDashing) {
                        angle = Math.PI / 2;
                    }
                    
                    ctx.rotate(player.facing === 1 ? angle : -angle + Math.PI);
                    
                    const swordColor = player.charge >= 60 ? '#fff' : '#00f2ff';
                    const swordLen = 70;
                    
                    // Handle (Tsuka)
                    ctx.strokeStyle = '#111';
                    ctx.lineWidth = 6;
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.lineTo(-15, 0);
                    ctx.stroke();

                    // Guard (Tsuba)
                    ctx.fillStyle = '#333';
                    ctx.fillRect(-5, -10, 6, 20);
                    
                    // Blade
                    const bladeGrad = ctx.createLinearGradient(0, -4, 0, 4);
                    bladeGrad.addColorStop(0, swordColor);
                    bladeGrad.addColorStop(0.5, '#fff');
                    bladeGrad.addColorStop(1, swordColor);
                    
                    ctx.fillStyle = bladeGrad;
                    ctx.shadowBlur = 30;
                    ctx.shadowColor = swordColor;
                    
                    ctx.beginPath();
                    ctx.moveTo(0, -4);
                    ctx.lineTo(swordLen - 12, -4);
                    ctx.lineTo(swordLen, 0);
                    ctx.lineTo(swordLen - 12, 4);
                    ctx.lineTo(0, 4);
                    ctx.closePath();
                    ctx.fill();
                    
                    ctx.restore();
                }
            } else if (player.weapon === 'bow') {
                ctx.save();
                ctx.translate(player.facing === 1 ? player.w : 0, player.h / 2);
                ctx.rotate(player.facing === 1 ? 0 : Math.PI);
                
                // Draw Bow
                ctx.strokeStyle = varColor('--neon-pink');
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, 25, -Math.PI/2, Math.PI/2);
                ctx.stroke();
                
                // Draw String
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, -25);
                const pull = player.isCharging ? (player.charge / 100) * 20 : 0;
                ctx.lineTo(-pull, 0);
                ctx.lineTo(0, 25);
                ctx.stroke();
                
                // Draw Arrow if charging
                if (player.isCharging) {
                    ctx.fillStyle = '#fff';
                    ctx.fillRect(-pull, -2, 30, 4);
                }
                
                ctx.restore();
            }
            ctx.restore();

            ctx.restore();

            // Transition Overlay
            if (transitionAlpha > 0) {
                ctx.fillStyle = `rgba(255, 255, 255, ${transitionAlpha})`;
                ctx.fillRect(0, 0, width, height);
            }

            // Scanlines
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            for(let i = 0; i < height; i += 4) {
                ctx.fillRect(0, i, width, 2);
            }

            // Shop UI
            if (showShop) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(width/2 - 200, height/2 - 150, 400, 300);
                ctx.strokeStyle = varColor('--neon-pink');
                ctx.lineWidth = 2;
                ctx.strokeRect(width/2 - 200, height/2 - 150, 400, 300);
                
                ctx.fillStyle = '#fff';
                ctx.font = '20px Orbitron';
                ctx.textAlign = 'center';
                ctx.fillText('NEON SHOP', width/2, height/2 - 110);
                ctx.font = '14px Orbitron';
                ctx.fillText(`COINS: ${coins_collected}`, width/2, height/2 - 85);
                
                shopItems.forEach((item, idx) => {
                    const y = height/2 - 40 + idx * 60;
                    const isSelected = selectedShopItem === idx;
                    
                    ctx.fillStyle = isSelected ? 'rgba(0, 242, 255, 0.2)' : (coins_collected >= item.price ? 'rgba(255, 255, 255, 0.1)' : 'rgba(255, 0, 0, 0.1)');
                    ctx.fillRect(width/2 - 180, y - 20, 360, 50);
                    ctx.strokeStyle = isSelected ? '#fff' : (coins_collected >= item.price ? varColor('--neon-cyan') : '#555');
                    ctx.strokeRect(width/2 - 180, y - 20, 360, 50);
                    
                    ctx.fillStyle = '#fff';
                    ctx.textAlign = 'left';
                    ctx.font = 'bold 14px Orbitron';
                    ctx.fillText(item.name, width/2 - 170, y + 5);
                    ctx.font = '10px Orbitron';
                    ctx.fillText(item.desc, width/2 - 170, y + 20);
                    
                    ctx.textAlign = 'right';
                    ctx.fillStyle = isSelected ? '#fff' : varColor('--neon-cyan');
                    ctx.fillText(isSelected ? 'CONFIRM?' : `${item.price}C`, width/2 + 170, y + 10);
                    
                    ctx.font = '8px Orbitron';
                    ctx.fillStyle = '#888';
                    ctx.textAlign = 'center';
                    ctx.fillText('CLICK ITEMS OR PRESS 1-3 TO BUY', width/2, height/2 + 135);
                });
            }
        }

        function varColor(name, fallback = '#fff') {
            const style = getComputedStyle(document.documentElement);
            if (!style) return fallback;
            const val = style.getPropertyValue(name).trim();
            return val || fallback;
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        initStars();
        initBuildings();
        generateFloor(1);
        resetPlayer();
        loop();
    </script>
</body>
</html>

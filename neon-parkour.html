<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Runner - Sector Ascent</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root {
            --neon-cyan: #00f2ff;
            --neon-pink: #ff0055;
            --bg-dark: #050508;
            --grid-line: rgba(0, 242, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: var(--bg-dark);
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', monospace;
            touch-action: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stat-box {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--neon-cyan);
            padding: 12px 20px;
            box-shadow: 4px 4px 0px var(--neon-cyan);
            min-width: 120px;
        }

        .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 4px;
        }

        .value {
            font-family: 'Orbitron', sans-serif;
            font-size: 20px;
            font-weight: 900;
        }

        #message {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 40px;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            color: #fff;
            background: var(--neon-pink);
            padding: 10px 30px;
            box-shadow: 8px 8px 0px #000;
            z-index: 20;
        }

        #message.active { opacity: 1; }

        .health-bar-container {
            width: 150px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            margin-top: 8px;
            border: 1px solid var(--neon-cyan);
            position: relative;
        }

        #health-bar {
            width: 100%;
            height: 100%;
            background: var(--neon-cyan);
            transition: width 0.2s;
        }

        #charge-bar {
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 0%;
            height: 4px;
            background: var(--neon-pink);
            transition: width 0.1s;
        }

        #hotbar {
            position: absolute;
            bottom: 30px;
            left: 30px;
            display: flex;
            gap: 15px;
            z-index: 100;
            pointer-events: auto;
        }
        .slot {
            width: 50px;
            height: 50px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            color: var(--neon-cyan);
            cursor: pointer;
            box-shadow: 4px 4px 0px var(--neon-cyan);
            transition: all 0.1s;
        }
        .slot.active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 4px 4px 0px #fff;
            transform: translateY(-5px);
        }

        #shop-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--neon-pink);
            color: #fff;
            border: 2px solid #000;
            padding: 10px 20px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            cursor: pointer;
            display: none;
            z-index: 100;
            box-shadow: 4px 4px 0px #000;
            text-transform: uppercase;
        }
        #shop-btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px #000;
        }
        #shop-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        /* Main Menu Styles */
        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        #menu-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 80px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            margin-bottom: 40px;
            text-shadow: 
                0 0 10px var(--neon-cyan),
                0 0 20px var(--neon-cyan),
                0 0 40px var(--neon-cyan);
            text-align: center;
            letter-spacing: 10px;
            animation: titleGlow 2s infinite alternate;
        }

        @keyframes titleGlow {
            from { text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); }
            to { text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px var(--neon-cyan), 0 0 60px var(--neon-pink); }
        }

        #play-btn {
            background: var(--neon-cyan);
            color: #000;
            border: none;
            padding: 20px 60px;
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 8px 8px 0px #fff;
            transition: all 0.1s;
            margin-bottom: 40px;
        }

        #play-btn:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0px #fff;
        }

        #play-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 4px 4px 0px #fff;
        }

        .volume-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: var(--neon-cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #volume-slider {
            -webkit-appearance: none;
            width: 200px;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            outline: none;
        }

        #volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--neon-cyan);
            cursor: pointer;
            border: 2px solid #fff;
        }

        /* Mobile Controls - Sharp Brutalist Style */
        #mobile-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 100;
            pointer-events: none;
        }

        .control-group {
            display: flex;
            gap: 20px;
            pointer-events: auto;
        }

        .btn {
            width: 70px;
            height: 70px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neon-cyan);
            font-size: 28px;
            font-weight: bold;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 4px 4px 0px var(--neon-cyan);
            pointer-events: auto;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--neon-cyan);
            background: var(--neon-cyan);
            color: #000;
        }

        @media (max-width: 1366px), (pointer: coarse) {
            #mobile-controls { display: flex; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="stat-box" id="sector-box">
            <div class="label">FLOOR</div>
            <div class="value"><span id="sector-val">01</span></div>
            <div class="health-bar-container">
                <div id="health-bar"></div>
                <div id="charge-bar"></div>
            </div>
        </div>
        <div class="stat-box" style="border-color: #ffd700; box-shadow: 4px 4px 0px #ffd700;">
            <div class="label" style="color: #ffd700; opacity: 1;">PIXEL COINS</div>
            <div class="value" id="coin-val" style="color: #ffd700;">0</div>
        </div>
    </div>
    
    <div id="message">FLOOR CLEAR</div>
    <button id="shop-btn">NEON SHOP</button>

    <div id="hotbar" style="display: none;">
        <div class="slot active" id="slot-sword">SWORD</div>
        <div class="slot" id="slot-bow">BOW</div>
    </div>

    <div id="mobile-controls">
        <div class="control-group">
            <div class="btn" id="btn-left">←</div>
            <div class="btn" id="btn-right">→</div>
        </div>
        <div class="control-group" style="gap: 15px;">
            <div class="btn" id="btn-switch" style="border-color: #ffd700; color: #ffd700; box-shadow: 4px 4px 0px #ffd700; font-size: 12px; display: none;">SWAP</div>
            <div class="btn" id="btn-attack" style="border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 4px 4px 0px var(--neon-pink);">ATK</div>
            <div class="btn" id="btn-jump">UP</div>
        </div>
    </div>

    <div id="main-menu">
        <div id="menu-title">NEON<br>PARKOUR</div>
        <button id="play-btn">START MISSION</button>
        <div class="volume-container">
            <label for="volume-slider">AUDIO VOLUME</label>
            <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5">
            <div id="audio-status" style="font-size: 10px; margin-top: 10px; opacity: 0.6; cursor: pointer; text-decoration: underline;">CLICK TO ENABLE AUDIO</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const sectorVal = document.getElementById('sector-val');
        const healthBar = document.getElementById('health-bar');
        const chargeBar = document.getElementById('charge-bar');
        const coinVal = document.getElementById('coin-val');
        const message = document.getElementById('message');
        const shopBtn = document.getElementById('shop-btn');
        const sectorBox = document.getElementById('sector-box');
        const mobileControls = document.getElementById('mobile-controls');
        const hotbar = document.getElementById('hotbar');
        const slotSword = document.getElementById('slot-sword');
        const slotBow = document.getElementById('slot-bow');
        const btnSwitch = document.getElementById('btn-switch');
        const mainMenu = document.getElementById('main-menu');
        const playBtn = document.getElementById('play-btn');
        const volumeSlider = document.getElementById('volume-slider');

        let gameState = 'menu';

        class MusicPlayer {
            constructor() {
                this.menuMusic = new Audio();
                this.localSources = ['./neon-parkour-audio/neon-menu.mp3', './menu-music.mp3', './main-music.mp3'];
                this.currentSourceIndex = 0;
                this.menuMusic.src = this.localSources[this.currentSourceIndex]; 
                this.menuMusic.loop = true;
                this.hasAttemptedDriveFallback = false;

                this.menuMusic.addEventListener('error', (e) => {
                    const status = document.getElementById('audio-status');
                    if (this.currentSourceIndex < this.localSources.length - 1) {
                        this.currentSourceIndex++;
                        console.log(`Trying next local source: ${this.localSources[this.currentSourceIndex]}`);
                        if (status) status.innerText = `LOADING MUSIC: ${this.localSources[this.currentSourceIndex]}...`;
                        this.menuMusic.src = this.localSources[this.currentSourceIndex];
                        if (gameState === 'menu') this.menuMusic.play().catch(() => {});
                    } else if (!this.hasAttemptedDriveFallback) {
                        console.log("Local music files not found. Trying Google Drive fallback...");
                        if (status) status.innerText = "LOCAL MUSIC MISSING. TRYING CLOUD FALLBACK...";
                        this.hasAttemptedDriveFallback = true;
                        this.menuMusic.src = 'https://drive.google.com/uc?export=download&id=1diTMWX7yVcugLWbOTz4kOL0v56A5Tg33';
                        if (gameState === 'menu') {
                            this.menuMusic.play().catch(() => {
                                console.error("All music sources failed.");
                                if (status) status.innerText = "MUSIC FAILED. PLEASE UPLOAD neon-parkour-audio/neon-menu.mp3";
                            });
                        }
                    } else {
                        console.error("All external music sources failed.");
                        if (status) status.innerText = "MUSIC FAILED. PLEASE UPLOAD neon-parkour-audio/neon-menu.mp3";
                    }
                });
            }
            
            start() {
                if (gameState === 'menu') {
                    this.menuMusic.play().then(() => {
                        const status = document.getElementById('audio-status');
                        if (status) status.style.display = 'none';
                    }).catch(e => {
                        console.log("Initial music play attempt failed. Waiting for fallback.");
                    });
                }
            }
            
            stop() {
                if (this.menuMusic) this.menuMusic.pause();
            }

            setVolume(val) {
                if (this.menuMusic) {
                    this.menuMusic.volume = val;
                }
            }

            switchToGame() {
                this.menuMusic.pause();
            }
            
            setCombatState(isCombat) {
                // No-op
            }
        }

        let musicSystem = null;

        function initMusic() {
            if (!musicSystem) {
                musicSystem = new MusicPlayer();
                musicSystem.start();
            } else {
                musicSystem.start();
            }
        }

        function toggleShop() {
            showShop = !showShop;
            selectedShopItem = -1; // Reset selection
            if (showShop) {
                if (sectorBox) sectorBox.style.display = 'none';
                if (mobileControls) mobileControls.style.display = 'none';
                if (hotbar) hotbar.style.display = 'none';
                if (shopBtn) shopBtn.innerText = 'CLOSE SHOP';
            } else {
                if (sectorBox) sectorBox.style.display = 'block';
                if (shopBtn) shopBtn.innerText = 'NEON SHOP';
                if (player.hasBow && hotbar) hotbar.style.display = 'flex';
                if (mobileControls && ('ontouchstart' in window || navigator.maxTouchPoints > 0)) {
                    mobileControls.style.display = 'flex';
                }
            }
        }

        canvas.addEventListener('click', (e) => {
            initMusic();
            if (!showShop) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            shopItems.forEach((item, idx) => {
                const y = height/2 - 40 + idx * 60;
                if (mouseX > width/2 - 180 && mouseX < width/2 + 180 &&
                    mouseY > y - 20 && mouseY < y + 30) {
                    buyItem(idx);
                }
            });
        });

        function switchWeapon() {
            if (!player.hasBow) return;
            player.weapon = player.weapon === 'sword' ? 'bow' : 'sword';
            updateHotbar();
        }

        function updateHotbar() {
            if (!player.hasBow) {
                if (hotbar) hotbar.style.display = 'none';
                if (btnSwitch) btnSwitch.style.display = 'none';
                return;
            }
            if (hotbar) hotbar.style.display = 'flex';
            if (btnSwitch) btnSwitch.style.display = 'flex';
            
            if (player.weapon === 'sword') {
                slotSword.classList.add('active');
                slotBow.classList.remove('active');
            } else {
                slotSword.classList.remove('active');
                slotBow.classList.add('active');
            }
        }

        if (slotSword) slotSword.addEventListener('click', () => { player.weapon = 'sword'; updateHotbar(); });
        if (slotBow) slotBow.addEventListener('click', () => { if(player.hasBow) { player.weapon = 'bow'; updateHotbar(); } });
        if (btnSwitch) btnSwitch.addEventListener('touchstart', (e) => { e.preventDefault(); switchWeapon(); });

        if (shopBtn) {
            shopBtn.addEventListener('click', toggleShop);
        }

        if (playBtn) {
            playBtn.addEventListener('click', () => {
                initMusic();
                gameState = 'playing';
                mainMenu.style.display = 'none';
                musicSystem.switchToGame();
            });
        }

        if (volumeSlider) {
            volumeSlider.addEventListener('input', (e) => {
                initMusic();
                if (musicSystem) {
                    musicSystem.setVolume(parseFloat(e.target.value));
                }
            });
        }

        const audioStatus = document.getElementById('audio-status');
        if (audioStatus) {
            audioStatus.addEventListener('click', (e) => {
                e.stopPropagation();
                initMusic();
            });
        }

        window.addEventListener('click', () => {
            initMusic();
        }, { once: true });

        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.body.classList.add('is-touch');
        }

        let width, height;
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Constants
        const GRAVITY = 0.55;
        const JUMP_FORCE = -12.5;
        const MOVE_SPEED = 7;
        const DRONE_SPEED = 2.5;
        const DRONE_TRACK_SPEED = 0.06;
        const KNIGHT_SPEED = MOVE_SPEED * 0.75;
        const PLAYER_SIZE_W = 30;
        const PLAYER_SIZE_H = 30;

        // Game State
        let floor = 1;
        let health = 100;
        let invincibilityFrames = 0;
        let pixelCoins = 0;
        let player = { 
            x: 100, y: 0, vx: 0, vy: 0, w: PLAYER_SIZE_W, h: PLAYER_SIZE_H, 
            grounded: false, jumps: 0, facing: 1,
            isAttacking: false, attackTimer: 0, attackType: 'normal',
            charge: 0, isCharging: false, isDashing: false, dashTimer: 0,
            weapon: 'sword', hasBow: false, chargeSpeed: 1, damageResist: 1
        };
        let arrows = [];
        let enemyProjectiles = [];
        let selectedShopItem = -1;
        let platforms = [];
        let spikes = [];
        let lasers = [];
        let crushers = [];
        let saws = [];
        let enemies = [];
        let coins = [];
        let particles = [];
        let cameraX = 0;
        let cameraY = 0;
        let keys = {};
        let frameCount = 0;
        let isTransitioning = false;
        let currentWave = 0;
        let totalWaves = 3;
        let arenaActive = false;
        let arenaCleared = false;
        let pendingArena = null;
        let waveTransition = false;
        let showShop = false;
        let coinsAtArenaStart = 0;
        let isElevatorRising = false;
        let elevatorY = 0;
        let shopItems = [
            { name: 'NEON BOW', price: 100, desc: 'RANGED WEAPON', action: () => { player.hasBow = true; player.weapon = 'bow'; updateHotbar(); } },
            { name: 'POWER CORE', price: 100, desc: 'FASTER CHARGE', action: () => { player.chargeSpeed = 2; } },
            { name: 'SHIELD', price: 150, desc: 'REDUCE DAMAGE', action: () => { player.damageResist = 0.5; } }
        ];
        let coins_collected = 0;

        function generateFloor(num) {
            platforms = [];
            spikes = [];
            lasers = [];
            crushers = [];
            saws = [];
            enemies = [];
            coins = [];
            enemyProjectiles = [];
            arenaActive = false;
            pendingArena = null;
            waveTransition = false;
            arenaCleared = false;
            
            let curX = 0;
            let curY = height - 150;

            if (num === 1) {
                // Floor 1: Lobby
                platforms.push({ x: -200, y: curY, w: 1000, h: 150 });
                platforms.push({ x: 950, y: curY, w: 300, h: 40 }); // Small gap
                platforms.push({ x: 1650, y: curY, w: 300, h: 40 }); // Large gap
                platforms.push({ x: 2100, y: curY - 60, w: 300, h: 40 }); // Raised
                spikes.push({ x: 2200, y: curY - 75, w: 100, h: 15 });
                
                platforms.push({ x: 2500, y: curY - 60, w: 400, h: 40 }); // Added platform for drone
                enemies.push({ 
                    x: 2550, y: curY - 100, w: 30, h: 30, vx: DRONE_SPEED, 
                    platform: { x: 2500, w: 400 }, health: 1, type: 'drone' 
                });
                platforms.push({ x: 3000, y: curY - 60, w: 200, h: 40, type: 'goal' });

            } else if (num === 2) {
                // Floor 2: Maintenance Floor
                platforms.push({ x: -200, y: curY, w: 600, h: 150 });
                lasers.push({ x: 600, y: curY - 300, w: 16, h: 300, state: 'off', timer: 0, cycle: 80 }); // Faster cycle
                platforms.push({ x: 800, y: curY, w: 300, h: 40 });
                platforms.push({ x: 1300, y: curY - 100, w: 300, h: 40 }); // Medium gap
                lasers.push({ x: 1450, y: curY - 400, w: 16, h: 300, state: 'off', timer: 0, cycle: 160 }); // Faster cycle
                
                platforms.push({ x: 1700, y: curY, w: 700, h: 40 }); // Missing platform
                platforms.push({ x: 2100, y: curY - 100, w: 300, h: 40 }); // Extra platform to bridge the gap
                
                enemies.push({ 
                    x: 1800, y: curY - 40, w: 30, h: 30, vx: DRONE_SPEED, 
                    platform: { x: 1700, w: 700 }, health: 1, type: 'drone' 
                });
                enemies.push({ 
                    x: 2100, y: curY - 40, w: 30, h: 30, vx: -DRONE_SPEED, 
                    platform: { x: 1700, w: 700 }, health: 1, type: 'drone' 
                });

                // Staircase
                platforms.push({ x: 2500, y: curY, w: 150, h: 40 });
                platforms.push({ x: 2650, y: curY - 60, w: 150, h: 40 });
                platforms.push({ x: 2800, y: curY - 120, w: 150, h: 40 });
                platforms.push({ x: 3000, y: curY - 120, w: 200, h: 40, type: 'goal' });

            } else if (num === 3) {
                // Floor 3: Service Shaft
                platforms.push({ x: -200, y: curY, w: 600, h: 150 });
                // Narrow corridor (implied by low ceiling if we had one, but we'll use tight platforms)
                platforms.push({ x: 500, y: curY, w: 400, h: 40 });
                crushers.push({ x: 650, y: curY - 300, w: 80, h: 100, startY: curY - 300, targetY: curY - 80, state: 'waiting', timer: 0, speed: 2 });
                
                platforms.push({ x: 1100, y: curY - 100, w: 200, h: 40 }); // Medium gap
                platforms.push({ x: 1500, y: curY, w: 200, h: 40, type: 'moving', startY: curY, range: 150, speed: 0.04 }); // Moving platform over pit
                
                platforms.push({ x: 1900, y: curY, w: 600, h: 40 });
                lasers.push({ x: 2100, y: curY - 300, w: 16, h: 300, state: 'off', timer: 0, cycle: 90 });
                lasers.push({ x: 2300, y: curY - 300, w: 16, h: 300, state: 'off', timer: 45, cycle: 90 });

                // Arena
                platforms.push({ x: 2700, y: curY, w: 1200, h: 150 });
                
                pendingArena = {
                    triggerX: 2950, // Trigger deeper into the arena
                    startX: 2660,   // Wall slightly before the platform start
                    endX: 3900,
                    y: curY,
                    waves: 2
                };
                
                currentWave = 0;
                totalWaves = 2;
                coinsAtArenaStart = coins_collected;

            } else if (num === 4) {
                // Floor 4: Reactor Access
                platforms.push({ x: -200, y: curY, w: 600, h: 150 });
                platforms.push({ x: 500, y: curY - 50, w: 150, h: 40 }); // Short hop
                lasers.push({ x: 750, y: curY - 300, w: 16, h: 300, state: 'off', timer: 0, cycle: 70 }); // Faster
                
                platforms.push({ x: 900, y: curY, w: 400, h: 40 });
